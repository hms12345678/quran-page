<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>حديث اليوم | خالص لوجه الله</title>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1e3c72">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="خالص لوجه الله">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #0f3460 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
            direction: rtl;
            overflow: hidden;
            position: relative;
            touch-action: manipulation;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.2) 0%, transparent 50%);
            animation: float 25s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .container {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 30px 25px;
            border-radius: 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 2;
            animation: slideInUp 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        }

        @keyframes slideInUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .prophet {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 0 2px 8px rgba(255, 215, 0, 0.4);
        }

        #hadith {
            font-size: 1.3rem;
            line-height: 1.6;
            font-weight: 600;
            margin: 20px 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #narrator {
            font-size: 1rem;
            color: #e8f4fd;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 15px;
            display: inline-block;
        }

        .notice {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 10px;
            border-radius: 20px;
        }

        #count { font-weight: bold; font-size: 1.1rem; color: #fff; }

        @media (max-width: 480px) {
            .container { padding: 20px; }
            #hadith { font-size: 1.15rem; }
        }
        audio { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="prophet">قال رسول الله ﷺ</div>
    <div id="hadith">جارٍ تحميل الحديث الشريف...</div>
    <div id="narrator"></div>
    <div class="notice">سيتم التوجيه تلقائياً خلال <span id="count">6</span> ثوانٍ</div>
</div>

<audio id="bgAudio" autoplay loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_b0e1fa1a16.mp3" type="audio/mpeg">
</audio>

<script>
const ahadith = [
  {text:"إنما الأعمال بالنيات، وإنما لكل امرئ ما نوى.", source:"البخاري"},
  {text:"من كان يؤمن بالله واليوم الآخر فليقل خيرا أو ليصمت.", source:"البخاري"},
  {text:"لا يؤمن أحدكم حتى يحب لأخيه ما يحب لنفسه.", source:"البخاري"},
  {text:"من حسن إسلام المرء تركه ما لا يعنيه.", source:"مسلم"},
  {text:"الدين النصيحة.", source:"مسلم"},
  {text:"من دل على خير فله مثل أجر فاعله.", source:"مسلم"},
  {text:"من سلك طريقا يلتمس فيه علما سهل الله له به طريقا إلى الجنة.", source:"البخاري"},
  {text:"الراحمون يرحمهم الرحمن.", source:"الترمذي"},
  {text:"الكلمة الطيبة صدقة.", source:"البخاري"},
  {text:"من لا يشكر الناس لا يشكر الله.", source:"أبو داود"},
  {text:"المؤمن للمؤمن كالبنيان يشد بعضه بعضا.", source:"البخاري"},
  {text:"تبسمك في وجه أخيك صدقة.", source:"الترمذي"},
  {text:"خيركم من تعلم القرآن وعلمه.", source:"البخاري"},
  {text:"الطهور شطر الإيمان.", source:"مسلم"},
  {text:"اتق الله حيثما كنت.", source:"الترمذي"},
  {text:"أحب الأعمال إلى الله أدومها وإن قل.", source:"البخاري"},
  {text:"من كان في حاجة أخيه كان الله في حاجته.", source:"البخاري"},
  {text:"إن الله جميل يحب الجمال.", source:"مسلم"},
  {text:"يسروا ولا تعسروا وبشروا ولا تنفروا.", source:"الترمذي"},
  {text:"أقرب ما يكون العبد من ربه وهو ساجد.", source:"البخاري"},
  {text:"إن الله لا ينظر إلى صوركم ولا إلى أموالكم ولكن ينظر إلى قلوبكم وأعمالكم.", source:"مسلم"},
  {text:"لا تغضب.", source:"البخاري"},
  {text:"ازهد في الدنيا يحبك الله وازهد فيما عند الناس يحبك الناس.", source:"الترمذي"},
  {text:"من لا يرحم لا يُرحم.", source:"البخاري"},
  {text:"الدعاء هو العبادة.", source:"مسلم"},
  {text:"أحب الناس إلى الله أنفعهم للناس.", source:"البخاري"},
  {text:"المسلم من سلم المسلمون من لسانه ويده.", source:"مسلم"},
  {text:"الرفق لا يكون في شيء إلا زانه.", source:"البخاري"},
  {text:"من توضأ فأحسن الوضوء خرجت خطاياه من جسده.", source:"مسلم"},
  {text:"من قال لا إله إلا الله دخل الجنة.", source:"البخاري"},
  {text:"إن الله كتب الإحسان على كل شيء.", source:"مسلم"},
  {text:"من لا يشكر القليل لا يشكر الكثير.", source:"الترمذي"},
  {text:"ما نقص مال من صدقة.", source:"البخاري"},
  {text:"من صلى عليّ صلاة صلى الله عليه بها عشرا.", source:"مسلم"},
  {text:"الحياء لا يأتي إلا بخير.", source:"البخاري"},
  {text:"المؤمن مرآة أخيه.", source:"مسلم"},
  {text:"من غشنا فليس منا.", source:"البخاري"},
  {text:"الصدقة تطفئ الخطيئة كما يطفئ الماء النار.", source:"الترمذي"},
  {text:"الجار قبل الدار.", source:"البخاري"},
  {text:"أحب البلاد إلى الله مساجدها.", source:"مسلم"},
  {text:"طلب العلم فريضة على كل مسلم.", source:"ابن ماجه"},
  {text:"البر حسن الخلق.", source:"البخاري"},
  {text:"المؤمن القوي خير وأحب إلى الله من المؤمن الضعيف.", source:"مسلم"},
  {text:"إن الله مع الصابرين.", source:"البخاري"},
  {text:"اتقوا النار ولو بشق تمرة.", source:"البخاري"}
];
    // اختيار حديث عشوائي فوراً
    const randomHadith = ahadith[Math.floor(Math.random() * ahadith.length)];
    document.getElementById("hadith").textContent = randomHadith.text;
    document.getElementById("narrator").textContent = `رواه ${randomHadith.source}`;

    // العداد التنازلي والتوجيه
    let count = 6;
    const countDisplay = document.getElementById('count');
    const timer = setInterval(() => {
        count--;
        countDisplay.textContent = count;
        if (count <= 0) {
            clearInterval(timer);
            window.location.href = "page1.html";
        }
    }, 1000);

    // تسجيل الـ Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                console.log('SW Registered ✅');
            }).catch(err => console.log('SW Registration Failed ❌', err));
        });
    }
</script>

</body>
</html>
