<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>أذكار النوم كاملة</title>
<style>
  :root {
    --bg-color: #0f172a;
    --card-bg: #1e293b;
    --accent: #38bdf8;
    --gold: #facc15;
  }

  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    margin: 0; padding: 0;
    background: var(--bg-color);
    color: white;
    display: flex; flex-direction: column;
    align-items: center; min-height: 100vh;
    padding-bottom: 40px;
  }

  h1 {
    margin: 25px 0; font-size: 24px;
    color: var(--accent);
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }

  .zikr-container { width: 100%; display: flex; flex-direction: column; align-items: center; }

  .zikr {
    background-color: var(--card-bg);
    padding: 20px; margin: 10px;
    border-radius: 18px; width: 88%;
    max-width: 500px; font-size: 1.1rem;
    line-height: 1.8; box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    cursor: pointer; transition: all 0.3s ease;
    border: 1px solid rgba(56, 189, 248, 0.1);
    -webkit-tap-highlight-color: transparent;
  }

  .zikr:active { transform: scale(0.98); background-color: #334155; }
  .done { opacity: 0.3; transform: scale(0.95); pointer-events: none; filter: grayscale(1); }

  .footer-row {
    display: flex; justify-content: space-between;
    align-items: center; margin-top: 15px;
    border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px;
  }

  .count-badge {
    background: var(--accent); color: #0f172a;
    width: 35px; height: 35px; line-height: 35px;
    text-align: center; border-radius: 50%;
    font-weight: bold; box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
  }

  .count-label { color: var(--gold); font-size: 0.9rem; }

  .back-btn {
    position: fixed; top: 15px; right: 15px;
    background: rgba(255,255,255,0.1); color: white;
    padding: 8px 15px; border-radius: 10px;
    text-decoration: none; font-size: 14px; z-index: 100;
    backdrop-filter: blur(5px);
  }
</style>
</head>
<body>

<a href="azkar.html" class="back-btn">رجوع ↩</a>
<h1>أذكار النوم 💤</h1>

<div class="zikr-container" id="sleepList"></div>

<script>
const sleepAzkar = [
  { text: "بِاسْمِكَ رَبِّـي وَضَعْـتُ جَنْـبي ، وَبِكَ أَرْفَعُـه، فَإِن أَمْسَـكْتَ نَفْسـي فارْحَـمْها ، وَإِنْ أَرْسَلْتَـها فاحْفَظْـها بِمـا تَحْفَـظُ بِه عِبـادَكَ الصّـالِحـين.", count: 1 },
  { text: "اللّهُـمَّ إِنَّـكَ خَلَـقْتَ نَفْسـي وَأَنْـتَ تَوَفّـاهـا لَكَ ممَـاتـها وَمَحْـياها ، إِنْ أَحْيَيْـتَها فاحْفَظْـها ، وَإِنْ أَمَتَّـها فَاغْفِـرْ لَـها . اللّهُـمَّ إِنَّـي أَسْـأَلُـكَ العـافِـيَة.", count: 1 },
  { text: "اللّهُـمَّ قِنـي عَذابَـكَ يَـوْمَ تَبْـعَثُ عِبـادَك.", count: 3 },
  { text: "بِاسْـمِكَ اللّهُـمَّ أَمـوتُ وَأَحْـيا.", count: 1 },
  { text: "الـحَمْدُ للهِ الَّذي أَطْـعَمَنا وَسَقـانا، وَكَفـانا، وَآوانا، فَكَـمْ مِمَّـنْ لا كـافِيَ لَـهُ وَلا مُـؤْوي.", count: 1 },
  { text: "اللّهُـمَّ عالِـمَ الغَـيبِ وَالشّـهادةِ فاطِـرَ السّماواتِ وَالأرْضِ رَبَّ كُـلِّ شَـيءٍ وَمَليـكَه، أَشْهـدُ أَنْ لا إِلـهَ إِلاّ أَنْت، أَعـوذُ بِكَ مِن شَـرِّ نَفْسـي، وَمِن شَـرِّ الشَّيْـطانِ وَشِـرْكِه، وَأَنْ أَقْتَـرِفَ عَلـى نَفْسـي سوءاً أَوْ أَجُـرَّهُ إِلـى مُسْـلِم.", count: 1 },
  { text: "اللّهُـمَّ أَسْـلَمْتُ نَفْـسي إِلَـيْكَ، وَفَوَّضْـتُ أَمْـري إِلَـيْكَ، وَوَجَّـهْتُ وَجْـهي إِلَـيْكَ، وَأَلْـجَـاْتُ ظَهـري إِلَـيْكَ، رَغْبَـةً وَرَهْـبَةً إِلَـيْكَ، لا مَلْجَـأَ وَلا مَنْـجـا مِنْـكَ إِلاّ إِلَـيْكَ، آمَنْـتُ بِكِتـابِكَ الّـذي أَنْزَلْـتَ وَبِنَبِـيِّـكَ الّـذي أَرْسَلْـت.", count: 1 },
  { text: "سُبْحَانَ اللَّهِ.", count: 33 },
  { text: "الْحَمْدُ لِلَّهِ.", count: 33 },
  { text: "اللَّهُ أَكْبَرُ.", count: 33 },
  { text: "يجمع كفيه ثم ينفث فيهما والقراءة فيهما‏:‏ {قل هو الله أحد} و‏{قل أعوذ برب الفلق} و‏{قل أعوذ برب الناس} ومسح ما استطاع من الجسد يبدأ بهما على رأسه ووجه وما أقبل من جسده.", count: 3 },
  { text: "سورة البقرة (الآيتان 285-286): آمَنَ الرَّسُولُ بِمَا أُنْزِلَ إِلَيْهِ مِنْ رَبِّهِ وَالْمُؤْمِنُونَ... رَبَّنا لا تُؤاخِذنا إِن نَسينا أَو أَخطَأنا...", count: 1 },
  { text: "آية الكرسى: اللّهُ لاَ إِلَـهَ إِلاَّ هُوَ الْحَيُّ الْقَيُّومُ... لاَ يَؤُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ.", count: 1 },
  { text: "<b>أذكار الأرق:</b> اللهم رب السموات السبع وما أظلت، ورب الأرضين وما أقلت، ورب الشياطين وما أضلت، كن لي جارا من خلقك كلهم جميعا... عز جارك، وجل ثناؤك.", count: 1 },
  { text: "أعوذ بكلمات الله التامة من غضبه وشر عباده، ومن همزات الشياطين وأن يحضرون.", count: 1 },
  { text: "<b>أذكار الأحلام:</b> فمن رأى شيئا يكرهه فلينفث عن شماله ثلاثا وليتعوذ من الشيطان، فإنها لا تضره.", count: 1 }
];

const container = document.getElementById('sleepList');

sleepAzkar.forEach(item => {
  const card = document.createElement('div');
  card.className = 'zikr';
  card.innerHTML = `${item.text}<div class="footer-row"><span class="count-label">التكرار</span><div class="count-badge">${item.count}</div></div>`;

  card.onclick = function() {
    const badge = this.querySelector('.count-badge');
    let current = parseInt(badge.innerText);
    if (current > 0) {
      current--;
      badge.innerText = current;
      if (navigator.vibrate) navigator.vibrate(40);
      new Audio('click.mp3').play().catch(()=>{});
      if (current === 0) this.classList.add('done');
    }
  };
  container.appendChild(card);
});
</script>
</body>
</html>
