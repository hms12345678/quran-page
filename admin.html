<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة الإدارة | Eng/ Hassan Sobeh</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #facc15; --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.8); --text: #f8fafc; --danger: #ef4444; --edit: #3b82f6; --success: #22c55e; }
        body { font-family: 'Cairo', sans-serif; background: radial-gradient(circle at top, #1e293b, #0f172a); background-attachment: fixed; color: var(--text); margin: 0; padding: 10px; min-height: 100vh; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card-bg); padding: 30px 20px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; width: 85%; max-width: 350px; backdrop-filter: blur(10px); }
        .container { max-width: 600px; margin: 0 auto; display: none; }
        
        /* العدادات */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: rgba(250, 204, 21, 0.1); border: 1px solid var(--primary); border-radius: 12px; padding: 12px; text-align: center; position: relative; }
        .stat-card h3 { margin: 0; font-size: 12px; opacity: 0.8; }
        .stat-card p { margin: 5px 0 0; font-size: 20px; font-weight: 800; color: var(--primary); }
        .notification-dot { position: absolute; top: -5px; right: -5px; width: 12px; height: 12px; background: var(--danger); border-radius: 50%; display: none; box-shadow: 0 0 10px var(--danger); }

        .glass-card { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        h2 { color: var(--primary); font-size: 18px; margin-bottom: 15px; border-right: 3px solid var(--primary); padding-right: 10px; display: flex; align-items: center; justify-content: space-between; }
        
        /* البلاغات */
        .report-item { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); padding: 12px; border-radius: 10px; margin-bottom: 10px; }
        .report-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; color: var(--primary); font-weight: bold; }
        .report-msg { font-size: 14px; margin: 5px 0; line-height: 1.4; }
        .btn-done { background: var(--success); color: white; border: none; padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: 'Cairo'; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 12px; color: var(--primary); }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-family: 'Cairo'; outline: none; font-size: 14px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--primary); color: #000; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .reader-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .actions { display: flex; gap: 5px; }
        .btn-del { background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .btn-edit { background: rgba(59, 130, 246, 0.2); color: var(--edit); border: 1px solid var(--edit); padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="login-box">
        <h2>دخول المهندس حسن</h2>
        <input type="password" id="passInput" placeholder="كلمة السر" style="text-align:center;">
        <button class="btn-main" onclick="checkPass()">دخول</button>
        <p id="errorMsg" style="color:var(--danger); font-size:12px; margin-top:10px; display:none;">كلمة السر غلط يا هندسة</p>
    </div>
</div>

<div class="container" id="adminContent">
    <div style="text-align:center; margin: 20px 0;">
        <h1 style="color:var(--primary); margin:0;">لوحة التحكم</h1>
        <p style="opacity:0.5; font-size:12px;">Eng/ Hassan Sobeh</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>إجمالي القراء</h3>
            <p id="stat-readers">0</p>
        </div>
        <div class="stat-card">
            <div id="notif-dot" class="notification-dot"></div>
            <h3>البلاغات النشطة</h3>
            <p id="stat-reports">0</p>
        </div>
    </div>

    <div id="reports-section" class="glass-card hidden">
        <h2 style="color: var(--danger); border-right-color: var(--danger);">🚨 بلاغات المستخدمين</h2>
        <div id="reportsList"></div>
    </div>

    <div class="glass-card">
        <h2 id="formTitle">إضافة قارئ جديد</h2>
        <input type="hidden" id="editId">
        <div class="input-group">
            <label>اسم الشيخ</label>
            <input type="text" id="rName" placeholder="مثال: ناصر القطامي">
        </div>
        <div class="input-group">
            <label>رابط الصورة</label>
            <input type="text" id="rImg" placeholder="https://...">
        </div>
        <div class="input-group">
            <label>نوع التلاوة</label>
            <select id="rType" onchange="toggleFields()">
                <option value="murattal">مرتل فقط</option>
                <option value="mojawwad">مجود فقط</option>
                <option value="both">كلاهما (مرتل ومجود)</option>
            </select>
        </div>
        <div id="field-murattal" class="input-group">
            <label id="lbl-m">سيرفر المرتل</label>
            <input type="text" id="rBaseM" placeholder="ضع رابط السيرفر هنا">
        </div>
        <div id="field-mojawwad" class="input-group hidden">
            <label>سيرفر المجود</label>
            <input type="text" id="rBaseMoj" placeholder="ضع رابط السيرفر هنا">
        </div>
        <button class="btn-main" id="submitBtn" onclick="saveData()">حفظ البيانات</button>
    </div>

    <div class="glass-card">
        <h2>القراء المضافون حالياً</h2>
        <div id="readersList"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBw812AvM_R21kHCUVaSk7W8DjhjW1-bJ0",
        authDomain: "khales-lwej-allah.firebaseapp.com",
        projectId: "khales-lwej-allah",
        storageBucket: "khales-lwej-allah.firebasestorage.app",
        messagingSenderId: "311601771834",
        appId: "1:311601771834:web:e3c60ad9b0a5306bda4c03"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // التحقق من الباسورد
    window.checkPass = () => {
        if(document.getElementById('passInput').value === "hassan2026") {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
        } else { document.getElementById('errorMsg').style.display = 'block'; }
    };

    // مراقبة البلاغات (Real-time Notifications)
    onSnapshot(query(collection(db, "reports"), orderBy("createdAt", "desc")), (snap) => {
        const list = document.getElementById('reportsList');
        const count = snap.size;
        document.getElementById('stat-reports').innerText = count;
        document.getElementById('notif-dot').style.display = count > 0 ? 'block' : 'none';
        document.getElementById('reports-section').classList.toggle('hidden', count === 0);
        
        list.innerHTML = "";
        snap.forEach(d => {
            const r = d.data();
            const date = r.createdAt ? new Date(r.createdAt.seconds * 1000).toLocaleTimeString('ar-EG') : 'الآن';
            list.innerHTML += `
                <div class="report-item">
                    <div class="report-header">
                        <span>الشيخ: ${r.readerName}</span>
                        <span>${date}</span>
                    </div>
                    <p class="report-msg">المشكلة: ${r.message}</p>
                    <button class="btn-done" onclick="resolveReport('${d.id}')">تم الإصلاح ✓</button>
                </div>`;
        });
    });

    window.resolveReport = async (id) => { await deleteDoc(doc(db, "reports", id)); };

    // مراقبة القراء
    let allRData = [];
    onSnapshot(query(collection(db, "readers"), orderBy("createdAt", "desc")), (snap) => {
        const list = document.getElementById('readersList');
        list.innerHTML = "";
        allRData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        document.getElementById('stat-readers').innerText = allRData.length + 31;
        
        allRData.forEach(r => {
            const tx = r.base_mojawwad ? "مرتل + مجود" : (r.mode === "mojawwad" ? "مجود" : "مرتل");
            list.innerHTML += `
                <div class="reader-item">
                    <div class="reader-info"><h4>${r.name}</h4><span>${tx}</span></div>
                    <div class="actions">
                        <button class="btn-edit" onclick="editR('${r.id}')">تعديل</button>
                        <button class="btn-del" onclick="deleteR('${r.id}')">حذف</button>
                    </div>
                </div>`;
        });
    });

    // الدوال المساعدة (نفس اللي فات)
    window.toggleFields = () => {
        const t = document.getElementById('rType').value;
        document.getElementById('field-mojawwad').classList.toggle('hidden', t !== 'both');
        document.getElementById('lbl-m').innerText = t === 'mojawwad' ? "سيرفر المجود" : "سيرفر المرتل";
    };

    window.saveData = async () => {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('rName').value;
        const img = document.getElementById('rImg').value;
        const type = document.getElementById('rType').value;
        const urlM = document.getElementById('rBaseM').value;
        const urlMoj = document.getElementById('rBaseMoj').value;
        if(!name || !urlM) return alert("أكمل البيانات يا هندسة!");

        let data = { name, img, updatedAt: serverTimestamp() };
        if(type === 'both') { data.base_murattal = urlM; data.base_mojawwad = urlMoj; data.mode = "murattal"; }
        else { data.base = urlM; data.mode = type; }

        if(id) { await updateDoc(doc(db, "readers", id), data); }
        else { data.createdAt = serverTimestamp(); await addDoc(collection(db, "readers"), data); }
        resetForm();
    };

    window.editR = (id) => {
        const r = allRData.find(x => x.id === id);
        document.getElementById('editId').value = id;
        document.getElementById('rName').value = r.name;
        document.getElementById('rImg').value = r.img || "";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.deleteR = async (id) => { if(confirm("حذف؟")) await deleteDoc(doc(db, "readers", id)); };
    function resetForm() { /* مسح الخانات */ }
</script>
</body>
</html>
