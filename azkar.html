<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أذكار اليوم - أزرق</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Arial', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        overflow: hidden;
        position: relative;
        /* تغيير الخلفية للأزرق الغامق */
        background: #0f172a; 
    }

    /* الخلفية المتحركة بلون أزرق سماوي خفيف */
    .background-animation {
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 2%, transparent 2%) repeat;
        background-size: 50px 50px;
        animation: moveBackground 30s linear infinite;
        z-index: 0;
    }

    @keyframes moveBackground {
        0% { transform: translate(0,0); }
        100% { transform: translate(50px,50px); }
    }

    /* تصميم الأزرار باللون الأزرق */
    .tab {
        position: relative;
        background-color: #1e293b; /* أزرق مائل للرمادي وقور */
        color: white;
        padding: 25px 50px;
        margin: 15px;
        border-radius: 15px;
        font-size: 22px;
        font-weight: bold;
        text-align: center;
        width: 80%;
        max-width: 400px;
        cursor: pointer;
        box-shadow: 0 8px 15px rgba(0,0,0,0.4);
        transition: 0.3s;
        z-index: 1;
        border: 1px solid rgba(56, 189, 248, 0.2); /* إطار أزرق خفيف */
    }

    .tab:hover {
        background-color: #334155; /* تفتيح اللون عند الوقوف عليه */
        transform: translateY(-3px);
        box-shadow: 0 12px 20px rgba(0,0,0,0.5);
        border-color: #38bdf8; /* توهج أزرق */
    }

    .tab span {
        display: block;
        font-size: 14px;
        color: #94a3b8; /* لون نص فرعي هادئ */
        margin-top: 5px;
        font-weight: normal;
    }

</style>
</head>
<body>

<div class="background-animation"></div>

<div class="tab" onclick="window.location.href='moorning.html'">
    🌅 أذكار الصباح
    <span>اضغط للانتقال للصفحة</span>
</div>

<div class="tab" onclick="window.location.href='night.html'">
    🌃 أذكار المساء
    <span>اضغط للانتقال للصفحة</span>
</div>

<div class="tab" onclick="window.location.href='noom.html'">
    💤 أذكار قبل النوم
    <span>اضغط للانتقال للصفحة</span>
</div>

<div class="tab" onclick="window.location.href='salah.html'">
    📿 أذكار بعد الصلاة
    <span>اضغط للانتقال للصفحة</span>
</div>

</body>
</html>
