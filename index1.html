<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title> خالص لوجه الله  </title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.9);
            --accent: #facc15; 
            --text: #f8fafc;
        }

        body {
            margin: 0; padding: 0;
            font-family: "Cairo", sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            background-attachment: fixed;
            color: var(--text);
            padding-top: 90px;
            padding-bottom: 150px;
        }

        /* شريط المعلومات */
        #top-info-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(15, 23, 42, 0.98);
            border-bottom: 2px solid var(--accent);
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; z-index: 2000; box-sizing: border-box;
        }

        .prayer-time { font-size: 18px; font-weight: 700; color: var(--accent); }

        .container { padding: 15px; max-width: 500px; margin: 0 auto; }

        /* بطاقات القراء */
        .reader-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; margin-bottom: 12px;
            overflow: hidden; transition: 0.3s;
        }
        .reader-card.open { border-color: var(--accent); }

        .reader-header {
            display: flex; align-items: center;
            padding: 12px; cursor: pointer; gap: 15px;
        }

        .reader-avatar {
            width: 60px; height: 60px; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--accent);
        }

        .reader-name { font-weight: 700; flex-grow: 1; }

        /* مفتاح التحويل (مجود / مرتل) */
        .mode-selector {
            display: none; /* يظهر فقط عند فتح البطاقة */
            justify-content: center;
            gap: 10px; padding: 10px;
            background: rgba(0,0,0,0.2);
        }
        .open .mode-selector { display: flex; }

        .mode-btn {
            padding: 5px 15px; border-radius: 20px; font-size: 12px;
            cursor: pointer; border: 1px solid var(--accent); color: var(--accent);
        }
        .mode-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        /* قائمة السور */
        .suras-box {
            max-height: 0; overflow: hidden;
            transition: max-height 0.4s ease-out;
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .open .suras-box { max-height: 380px; overflow-y: auto; padding: 15px; }

        .sura-item {
            background: rgba(255,255,255,0.05); padding: 10px 2px;
            border-radius: 8px; font-size: 12px; text-align: center;
        }

        /* المشغل */
       .player-fixed {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #0f172a; border-top: 2px solid var(--accent);
            padding: 15px; z-index: 3000;
        }
        audio { width: 100%; filter: invert(0.9); }

        .playing-title { text-align: center; color: var(--accent); font-size: 13px; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div id="top-info-bar">
    <div style="text-align: right;">
        <span style="font-size: 12px; opacity: 0.7;">الصلاة القادمة</span><br>
        <span class="prayer-time" id="p-timer">--:--</span>
    </div>
    <div style="text-align: left; font-size: 11px;">
        <div id="h-date"></div>
        <div id="m-date"></div>
    </div>
</div>

<div class="container" id="rList"></div>

<div class="player-fixed">
    <div class="playing-title" id="trackName">جاهز للاستماع..</div>
    <audio id="mainAudio" controls></audio>
</div>

<script>
    const suras = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الانسان","المرسلات","النبأ","النازعات","عبس","التكوير","الإنفطار","المطففين","الإنشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    // قاعدة بيانات القراء (30 قارئ)
    // لاحظ: القارئ اللي عنده مجود ومرتل بنحط له "base_murattal" و "base_mojawwad"
    const readers = [
        { name: "محمد صديق المنشاوي", img:"minshawi.jpg", base_murattal: "https://server10.mp3quran.net/minsh/", base_mojawwad: "https://server10.mp3quran.net/minsh/Almusshaf-Al-Mojawwad/", mode: "murattal" },
        { name: "عبدالباسط عبدالصمد", img: "baset.jpg", base_murattal: "https://server7.mp3quran.net/basit/", base_mojawwad: "https://server7.mp3quran.net/basit/Almusshaf-Al-Mojawwad/", mode: "murattal" },
        { name: "محمود خليل الحصري", img: " hosary.jpg", base_murattal: "https://server13.mp3quran.net/husr/", base_mojawwad: "https://server13.mp3quran.net/husr/Almusshaf-Al-Mojawwad/", mode: "murattal" },
        { name: "مصطفى إسماعيل", img: " mostafa.jpg", base_murattal: "https://server8.mp3quran.net/mustafa/", base_mojawwad: "https://server8.mp3quran.net/mustafa/Almusshaf-Al-Mojawwad/", mode: "murattal" },
        { name: "محمود علي البنا", img: " bana.jpg", base_murattal: "https://server8.mp3quran.net/bna/", base_mojawwad: " https://server8.mp3quran.net/bna/Almusshaf-Al-Mojawwad/", mode: "murattal" },
        { name: "ياسر الدوسري", img: " dosri.jpg", base: "https://server11.mp3quran.net/yasser/" },
        { name: "ماهر المعيقلي", img: " Maher_Al_Mueaqly.png", base: "https://server12.mp3quran.net/maher/Almusshaf-Al-Mojawwad/" },
        { name: "مشاري العفاسي", img: " afasy.jpg", base: "https://server8.mp3quran.net/afs/" },
        { name: "إسلام صبحي", img: "islam sobhi.jpg ", base: " https://server14.mp3quran.net/islam/Rewayat-Hafs-A-n-Assem/" },
        { name: "أحمد العجمي", img: " أحمد بن علي العجمي.jpg", base: "https://server10.mp3quran.net/ajm/128/" },
        { name: "سعد الغامدي", img: " الغامدي.jpg", base: "https://server7.mp3quran.net/s_gmd/128/" },
        { name: "سعود الشريم", img: " الشريم.jpg", base: "https://server7.mp3quran.net/shur/128/" },
        { name: "عبدالرحمن السديس", img: " السديس.jpg", base: "https://server11.mp3quran.net/sds/" },
        { name: "خالد الجليل", img: " الجليل.jpg", base: "https://server10.mp3quran.net/jleel/" },
        { name: "فارس عباد", img: " فارس عباد.webp", base: "https://server8.mp3quran.net/frs_a/" },
        { name: "إدريس أبكر", img: " idrees-abkar.jpg", base: "https://server6.mp3quran.net/abkr/" },
        { name: "ناصر القطامي", img: " القطامي.jpg", base: "https://server6.mp3quran.net/qtm/" },
        { name: "محمد اللحيدان", img: " اللحيدان.jpg", base: "https://server8.mp3quran.net/lhdan/" },
        { name: "بدر التركي", img: " بدر التركي.jpg", base: " https://server10.mp3quran.net/bader/Rewayat-Hafs-A-n-Assem/" },
        { name: "صلاح بو خاطر", img: " صلاح بو خاطر.jpg", base: "https://server8.mp3quran.net/bu_khtr/" },
        { name: "محمد محمود الطبلاوي", img: " الطبلاوي.webp", base: "https://server12.mp3quran.net/tblawi/" },
        { name: "هاني الرفاعي", img: " هاني الرفاعي.jpg", base: "https://server8.mp3quran.net/hani/" },
        { name: "أبو بكر الشاطري", img: "abu-bakr-al-shatri.jpg ", base: "https://server11.mp3quran.net/shatri/" },
        { name: "علي جابر", img: " علي جابر.jpg", base: "https://server11.mp3quran.net/a_jbr/" },
        { name: "محمد أيوب", img: " محمد ايوب.jpg", base: "https://server8.mp3quran.net/ayyub/" },
        { name: "خليفة الطنيجي", img: " khalifa-al-tunaiji.png", base: "https://server12.mp3quran.net/tnjy/" },
        { name: "الدوكالي العالم", img: " doukali-muhammad-al-alam2.webp", base: "https://server7.mp3quran.net/dokali/" },
        { name: "علي الحذيفي", img: " الحذيفي.jpg", base: "https://server9.mp3quran.net/hthfi/128-hfs/" },
      { name: "بندر بليله", img: " بندر بليله.jpg", base: "https://server6.mp3quran.net/balilah/" },

      { name: " احمد نعينع", img: "احمد نعينع.jpg", base: "https://server11.mp3quran.net/ahmad_nu/" },
    
    
    
    
    
    
    
    
    
    
    
    ];






















    const list = document.getElementById("rList");

    readers.forEach((r, idx) => {
        const card = document.createElement("div");
        card.className = "reader-card";
        
        // لو القارئ عنده النوعين، نطلع زراير التحويل
        const hasModes = r.base_mojawwad ? true : false;
        const modeHTML = hasModes ? `
            <div class="mode-selector">
                <div class="mode-btn active" id="btn-murt-${idx}" onclick="setMode(${idx}, 'murattal')">مرتل</div>
                <div class="mode-btn" id="btn-moj-${idx}" onclick="setMode(${idx}, 'mojawwad')">مجود</div>
            </div>
        ` : '';

        card.innerHTML = `
            <div class="reader-header" onclick="toggleCard(${idx})">
                <img src="${r.img}" class="reader-avatar" onerror="this.src='https://via.placeholder.com/100/1e293b/facc15?text=Q'">
                <div class="reader-name">${r.name}</div>
            </div>
            ${modeHTML}
            <div class="suras-box" id="box-${idx}"></div>
        `;

        const box = card.querySelector(`#box-${idx}`);
        suras.forEach((s, sIdx) => {
            const btn = document.createElement("div");
            btn.className = "sura-item";
            btn.textContent = s;
            btn.onclick = (e) => { e.stopPropagation(); play(idx, s, sIdx+1); };
            box.appendChild(btn);
        });
        list.appendChild(card);
    });

    function setMode(rIdx, mode) {
        readers[rIdx].mode = mode;
        document.getElementById(`btn-murt-${rIdx}`).classList.toggle("active", mode === 'murattal');
        document.getElementById(`btn-moj-${rIdx}`).classList.toggle("active", mode === 'mojawwad');
    }

    function toggleCard(i) {
        document.querySelectorAll(".reader-card").forEach((c, idx) => {
            if(i === idx) c.classList.toggle("open"); else c.classList.remove("open");
        });
    }

    function play(rIdx, sName, sNum) {
        const r = readers[rIdx];
        const audio = document.getElementById("mainAudio");
        let baseUrl = r.base;
        
        if(r.base_mojawwad) {
            baseUrl = (r.mode === 'mojawwad') ? r.base_mojawwad : r.base_murattal;
        }

        audio.src = `${baseUrl}${sNum.toString().padStart(3,'0')}.mp3`;
        document.getElementById("trackName").textContent = `تشغيل: ${sName} - ${r.name} (${r.mode === 'mojawwad' ? 'مجود' : 'مرتل'})`;
        audio.play();
    }

    // التاريخ وصلاة القادمة
    function updateClock() {
        const now = new Date();
        document.getElementById("m-date").textContent = now.toLocaleDateString('ar-EG', {day:'numeric', month:'short', year:'numeric'});
        document.getElementById("h-date").textContent = now.toLocaleDateString('ar-SA', {calendar:'islamic', day:'numeric', month:'long'});
        
        const prayers = [
            {n:"الفجر", t:"05:10"}, {n:"الظهر", t:"12:05"}, {n:"العصر", t:"15:35"}, {n:"المغرب", t:"18:10"}, {n:"العشاء", t:"19:30"}
        ];
        const curStr = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
        let next = prayers.find(p => p.t > curStr) || prayers[0];
        
        let [h, m] = next.t.split(':');
        let hh = parseInt(h);
        let suffix = hh >= 12 ? "م" : "ص";
        hh = hh % 12 || 12;
        document.getElementById("p-timer").textContent = `${hh}:${m} ${suffix}`;
    }
    setInterval(updateClock, 60000); updateClock();
</script>
</body>
</html>
