<div id="top-info-bar">
    <div class="prayer-next-info">

<div class="search-container">

        </div>

            <span id="miniPlayBtn" onclick="event.stopPropagation(); togglePlay();" style="font-size:20px">▶</span>
            <span onclick="event.stopPropagation(); closePlayer();" style="color:#ff4757; font-weight:bold; font-size:18px">✕</span>
        </div>
    </div>
    <div class="expanded-view">
        <button onclick="minimizePlayer()" style="background:none; border:none; color:var(--accent); font-size:24px;">▼</button>
        <img id="e-img" src="" class="big-img">
        <h2 id="e-track" style="color:var(--accent); margin:0;">--</h2>
        <p id="e-reader" style="opacity:0.7; margin:5px 0 20px;">--</p>
        <div class="controls-group">
            <div class="progress-container">
                <span id="currentTime" style="font-size:10px">00:00</span>
                <input type="range" id="seekSlider" value="0">
                <span id="totalTime" style="font-size:10px">00:00</span>
            </div>
            <div class="main-controls">
                <button style="background:none; border:none; color:white; font-size:25px" onclick="skip(-10)">⏪</button>
                <button class="play-pause-btn" id="e-playBtn" onclick="togglePlay()">▶</button>
                <button style="background:none; border:none; color:white; font-size:25px" onclick="skip(10)">⏩</button>
            </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBw812AvM_R21kHCUVaSk7W8DjhjW1-bJ0",
      authDomain: "khales-lwej-allah.firebaseapp.com",
      projectId: "khales-lwej-allah",
      storageBucket: "khales-lwej-allah.firebasestorage.app",
      messagingSenderId: "311601771834",
      appId: "1:311601771834:web:e3c60ad9b0a5306bda4c03"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const q = query(collection(db, "readers"), orderBy("createdAt", "asc"));
    onSnapshot(q, (snapshot) => {
        const dynamicReaders = snapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data(),
            isDynamic: true
        }));
        window.updateAllReaders(dynamicReaders);
    });

    window.submitReportToFirebase = async () => {
        const rName = document.getElementById('reportReaderName').value;
        const msg = document.getElementById('issueText').value;
        const btn = document.getElementById('sendReportBtn');
        if(!rName || !msg) return alert("يا هندسة كمل البيانات عشان أعرف أصلح المشكلة");
        btn.innerText = "جاري الإرسال...";
        btn.disabled = true;
        try {
            await addDoc(collection(db, "reports"), { readerName: rName, message: msg, createdAt: serverTimestamp() });
            alert("تم إرسال البلاغ للمهندس حسن، وسيتم الإصلاح قريباً إن شاء الله");
            document.getElementById('reportReaderName').value = "";
            document.getElementById('issueText').value = "";
            closeReportModal();
        } catch (e) { alert("حدث خطأ، جرب تاني يا هندسة"); } finally { btn.innerText = "إرسال للبلاغات"; btn.disabled = false; }
    };
</script>

    let allReaders = [...staticReaders];
    let favorites = JSON.parse(localStorage.getItem('favReaders')) || [];
    const audio = document.getElementById("mainAudio");

    window.updateAllReaders = (dynamicOnes) => {
        allReaders = [...staticReaders, ...dynamicOnes];
        renderReaders(searchInput.value);
    };

    function renderReaders(query = "") {
        const rList = document.getElementById("rList");
        const favList = document.getElementById("favList");
        rList.innerHTML = ""; favList.innerHTML = "";
        const filtered = allReaders.filter(r => r.name.includes(query));
        filtered.forEach(r => {
            const isFav = favorites.includes(r.id.toString());
            rList.appendChild(createCard(r, isFav));
            if(isFav && query === "") favList.appendChild(createCard(r, isFav, true));
        });
        document.getElementById('fav-section').style.display = (favorites.length > 0 && query === "") ? 'block' : 'none';

        const hasBoth = (r.base_murattal && r.base_mojawwad);
        const modeHTML = hasBoth ? `
            <div class="mode-selector">
                <div class="mode-btn ${r.mode === 'murattal' ? 'active' : ''}" id="murt-${uniqueId}" onclick="event.stopPropagation(); setModeByReaderId('${r.id}', 'murattal', '${uniqueId}')">مرتل</div>
                <div class="mode-btn ${r.mode === 'mojawwad' ? 'active' : ''}" id="moj-${uniqueId}" onclick="event.stopPropagation(); setModeByReaderId('${r.id}', 'mojawwad', '${uniqueId}')">مجود</div>
            </div>` : '';
        card.innerHTML = `
            <div class="reader-header" onclick="toggleCard('${uniqueId}')">
                <img src="${r.img}" class="reader-avatar" onerror="this.src='https://via.placeholder.com/50';">
                <div class="reader-name">${r.name} ${(!hasBoth && r.mode === 'mojawwad') ? '(مجود)' : ''}</div>
                <button class="fav-btn ${isFav ? 'is-fav' : ''}" onclick="toggleFav(event, '${r.id}')" style="background:none; border:none; color:rgba(255,255,255,0.2); font-size:20px; cursor:pointer;">♥</button>
            </div>
            ${modeHTML}
            <div class="suras-box" id="box-${uniqueId}"></div>`;
        const box = card.querySelector(`#box-${uniqueId}`);
        suras.forEach((s, sIdx) => {
            const btn = document.createElement("div");
            btn.className = "sura-item"; btn.textContent = s;
            btn.onclick = (e) => { e.stopPropagation(); playByReaderId(r.id, s, sIdx+1); };
            box.appendChild(btn);
        });
        return card;
    }

    function playByReaderId(readerId, sName, sNum) {
        const r = allReaders.find(item => item.id == readerId);
        if(!r) return;
        let base = (r.base_murattal && r.base_mojawwad) ? (r.mode === 'mojawwad' ? r.base_mojawwad : r.base_murattal) : (r.base || r.base_murattal);
        audio.src = `${base}${sNum.toString().padStart(3,'0')}.mp3`;
        document.getElementById("m-track").textContent = sName;
        document.getElementById("e-track").textContent = sName;
        let modeType = (r.base_murattal && r.base_mojawwad) ? (r.mode === 'mojawwad' ? " (مجود)" : " (مرتل)") : (r.mode === 'mojawwad' ? " (مجود)" : "");
        document.getElementById("m-reader").textContent = r.name + modeType;
        document.getElementById("e-reader").textContent = r.name + modeType;
        document.getElementById("m-img").src = r.img;
        document.getElementById("e-img").src = r.img;
        playerWrap.style.display = "flex";
        audio.play();
        updatePlayIcons(true);

        // Media Session API لمنع التقطيع عند قفل الشاشة
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: sName,
                artist: r.name,
                album: 'خالص لوجه الله',
                artwork: [{ src: r.img, sizes: '512x512', type: 'image/jpg' }]
            });
            navigator.mediaSession.setActionHandler('play', () => { audio.play(); updatePlayIcons(true); });
            navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); updatePlayIcons(false); });
        }
    }

    function setModeByReaderId(readerId, mode, uniqueId) {
        const r = allReaders.find(item => item.id == readerId);
        if(r) r.mode = mode;
        const card = document.getElementById(`box-${uniqueId}`).parentElement;
        const murtBtn = card.querySelector('.mode-btn[id^="murt-"]');
        const mojBtn = card.querySelector('.mode-btn[id^="moj-"]');
        if(murtBtn && mojBtn) { murtBtn.classList.toggle("active", mode === 'murattal'); mojBtn.classList.toggle("active", mode === 'mojawwad'); }
    }

    function toggleFav(e, id) { e.stopPropagation(); const strId = id.toString(); const idx = favorites.indexOf(strId); idx > -1 ? favorites.splice(idx, 1) : favorites.push(strId); localStorage.setItem('favReaders', JSON.stringify(favorites)); renderReaders(searchInput.value); }
    function toggleCard(id) { const card = document.getElementById(`box-${id}`).parentElement; const isOpen = card.classList.contains('open'); document.querySelectorAll('.reader-card').forEach(c => c.classList.remove('open')); if(!isOpen) card.classList.add('open'); }
    function togglePlay() { audio.paused ? (audio.play(), updatePlayIcons(true)) : (audio.pause(), updatePlayIcons(false)); }
    function updatePlayIcons(isPlaying) { const icon = isPlaying ? "⏸" : "▶"; document.getElementById("miniPlayBtn").textContent = icon; document.getElementById("e-playBtn").textContent = icon; }
    function closePlayer() { audio.pause(); playerWrap.style.display = "none"; playerWrap.classList.remove("expanded"); }
    function expandPlayer() { playerWrap.classList.add("expanded"); }
    function minimizePlayer() { playerWrap.classList.remove("expanded"); }
    function skip(sec) { audio.currentTime += sec; }
    function handleSearch() { renderReaders(searchInput.value); }
    function clearSearch() { searchInput.value = ""; renderReaders(""); }
    function openReportModal() { document.getElementById('reportModal').style.display = 'flex'; }
    function closeReportModal() { document.getElementById('reportModal').style.display = 'none'; }
    
    audio.ontimeupdate = () => { if(!isNaN(audio.duration)) { document.getElementById("seekSlider").value = (audio.currentTime / audio.duration) * 100; document.getElementById("currentTime").textContent = formatTime(audio.currentTime); document.getElementById("totalTime").textContent = formatTime(audio.duration); } };
    document.getElementById("seekSlider").oninput = (e) => audio.currentTime = (e.target.value / 100) * audio.duration;
    function formatTime(s) { let m = Math.floor(s/60); s = Math.floor(s%60); return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }

    let timings = null;
    async function getPrayers() { try { const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Cairo&country=Egypt&method=5'); const d = await res.json(); timings = d.data.timings; } catch(e) {} }
    function updateCountdown() {
        const now = new Date();
        document.getElementById("m-date").textContent = now.toLocaleDateString('ar-EG', {day:'numeric', month:'short'});
        document.getElementById("h-date").textContent = now.toLocaleDateString('ar-SA', {calendar:'islamic', day:'numeric', month:'long'});
        if(!timings) return;
        const pKeys = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
        const pNames = {Fajr:"الفجر", Dhuhr:"الظهر", Asr:"العصر", Maghrib:"المغرب", Isha:"العشاء"};
        let nextP = null;
        for (let k of pKeys) {
            const [h, m] = timings[k].split(':');
            const pDate = new Date(); pDate.setHours(h, m, 0);
            if(pDate > now) { nextP = { n: pNames[k], t: pDate }; break; }
        }
        if(!nextP) { const [h, m] = timings["Fajr"].split(':'); const pDate = new Date(now.getTime() + 86400000); pDate.setHours(h, m, 0); nextP = { n: "الفجر", t: pDate }; }
        document.getElementById("p-name").textContent = nextP.n;
        const diff = nextP.t - now;
        const hh = Math.floor(diff/3600000), mm = Math.floor((diff%3600000)/60000), ss = Math.floor((diff%60000)/1000);
        document.getElementById("p-countdown").textContent = `${hh.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}:${ss.toString().padStart(2,'0')}`;
    }

    getPrayers(); setInterval(updateCountdown, 1000);
</script>


<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.pushNotifications?.requestPermission(); // اختياري للنوتيفيكشن
            navigator.serviceWorker.register('./sw.js')
                .then(reg => {
                    console.log('تم تسجيل الـ Service Worker بنجاح يا هندسة ✅', reg.scope);
                })
                .catch(err => {
                    console.log('فيه مشكلة في تسجيل الـ SW ❌', err);
                });
        });
    }

    // كود إضافي عشان لو النت قطع وأنت فاتح التطبيق يظهر تنبيه بسيط (اختياري)
    window.addEventListener('offline', () => {
        console.log("النت قطع، بس متقلقش التطبيق شغال Offline");
    });
</script>
