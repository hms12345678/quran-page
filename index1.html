<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>خالص لوجه الله | Eng. Hassan Sobeh</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.9); --accent: #facc15; --play-green: #10b981; --text: #f8fafc; --heart-red: #ff4757; }
        body { margin: 0; padding: 0; font-family: "Cairo", sans-serif; background: radial-gradient(circle at top, #1e293b, #0f172a); background-attachment: fixed; color: var(--text); padding-top: 155px; padding-bottom: 120px; }
        #top-info-bar { position: fixed; top: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 0.95); border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; z-index: 2000; box-sizing: border-box; }
        .search-container { position: fixed; top: 65px; left: 0; width: 100%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); padding: 12px 15px; z-index: 1900; box-sizing: border-box; }
        .search-wrapper { position: relative; width: 100%; }
        .search-input { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid rgba(250, 204, 21, 0.2); background: rgba(255,255,255,0.07); color: #fff; font-family: 'Cairo'; font-size: 16px; outline: none; box-sizing: border-box; }
        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .section-title { font-size: 14px; color: var(--accent); margin: 20px 0 10px; font-weight: bold; }
        .reader-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; margin-bottom: 12px; overflow: hidden; transition: 0.3s; }
        .reader-card.open { border-color: var(--accent); }
        .reader-header { display: flex; align-items: center; padding: 12px; cursor: pointer; gap: 12px; }
        .reader-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        .reader-name { font-weight: 700; flex-grow: 1; font-size: 15px; }
        .fav-btn.is-fav { color: var(--heart-red) !important; transform: scale(1.2); }
        .mode-selector { display: none; justify-content: center; gap: 10px; padding: 10px; background: rgba(0,0,0,0.2); }
        .open .mode-selector { display: flex; }
        .mode-btn { padding: 4px 15px; border-radius: 20px; font-size: 11px; cursor: pointer; border: 1px solid var(--accent); color: var(--accent); }
        .mode-btn.active { background: var(--accent); color: #000; font-weight: bold; }
        .suras-box { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .open .suras-box { max-height: 380px; overflow-y: auto; padding: 15px; }
        .sura-item { background: rgba(255,255,255,0.05); padding: 8px 2px; border-radius: 8px; font-size: 11px; text-align: center; cursor: pointer; }
        .modern-player { position: fixed; bottom: 15px; left: 10px; right: 10px; background: #1e293b; border-radius: 12px; z-index: 3000; display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(16, 185, 129, 0.3); }
        .modern-player.expanded { bottom: 0; left: 0; right: 0; height: 100%; border-radius: 0; padding-top: 40px; }
        .mini-view { display: flex; align-items: center; padding: 10px; cursor: pointer; }
        .expanded .mini-view { display: none; }
        .mini-img { width: 40px; height: 40px; border-radius: 6px; margin-left: 10px; }
        .expanded-view { display: none; flex-direction: column; align-items: center; padding: 20px; text-align: center; }
        .expanded .expanded-view { display: flex; }
        .big-img { width: 220px; height: 220px; border-radius: 20px; border: 2px solid var(--play-green); margin: 20px 0; object-fit: cover; }
        .play-pause-btn { width: 60px; height: 60px; background: var(--play-green); color: white; border-radius: 50%; font-size: 24px; border: none; cursor: pointer; }
        .eng-footer { margin-top: auto; padding-bottom: 20px; color: var(--accent); font-size: 11px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="top-info-bar">
    <div class="prayer-next-info">
        <span style="font-size:11px; opacity:0.8">باقي على <span id="p-name">--</span></span>
        <span class="countdown-val" id="p-countdown">00:00:00</span>
    </div>
    <div style="text-align: left; font-size: 11px;">
        <div id="h-date" style="color: var(--accent); font-weight: bold;"></div>
        <div id="m-date"></div>
    </div>
</div>

<div class="search-container">
    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن قارئ..." oninput="handleSearch()">
    </div>
</div>

<div class="container">
    <div id="fav-section" style="display: none;"><div class="section-title">⭐ المفضلون</div><div id="favList"></div></div>
    <div class="section-title">📖 كل القراء</div><div id="rList"></div>
</div>

<div class="modern-player" id="playerWrap">
    <div class="mini-view" onclick="expandPlayer()">
        <img id="m-img" src="" class="mini-img">
        <div style="flex-grow:1">
            <h4 id="m-track" style="margin:0; font-size:13px; color:var(--play-green);">--</h4>
            <p id="m-reader" style="margin:0; font-size:10px; opacity:0.7">--</p>
        </div>
        <div style="display:flex; gap:15px; align-items:center; margin-right:10px;">
            <span id="miniPlayBtn" onclick="event.stopPropagation(); togglePlay();" style="font-size:20px; color:var(--play-green)">▶</span>
            <span onclick="event.stopPropagation(); closePlayer();" style="color:#ff4757; font-weight:bold; font-size:18px">✕</span>
        </div>
    </div>
    <div class="expanded-view">
        <button onclick="minimizePlayer()" style="background:none; border:none; color:var(--play-green); font-size:24px;">▼</button>
        <img id="e-img" src="" class="big-img">
        <h2 id="e-track" style="color:var(--play-green); margin:0;">--</h2>
        <p id="e-reader" style="opacity:0.7; margin:5px 0 20px;">--</p>
        <div style="width: 100%; max-width: 350px;">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
                <span id="currentTime" style="font-size:10px">00:00</span>
                <input type="range" id="seekSlider" value="0">
                <span id="totalTime" style="font-size:10px">00:00</span>
            </div>
            <div style="display:flex; justify-content:center; align-items:center; gap:30px;">
                <button style="background:none; border:none; color:white; font-size:25px" onclick="skip(-10)">⏪</button>
                <button class="play-pause-btn" id="e-playBtn" onclick="togglePlay()">▶</button>
                <button style="background:none; border:none; color:white; font-size:25px" onclick="skip(10)">⏩</button>
            </div>
        </div>
        <div class="eng-footer">Eng / Hassan Sobeh</div>
    </div>
    <audio id="mainAudio" preload="auto"></audio>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBw812AvM_R21kHCUVaSk7W8DjhjW1-bJ0", authDomain: "khales-lwej-allah.firebaseapp.com", projectId: "khales-lwej-allah", storageBucket: "khales-lwej-allah.firebasestorage.app", messagingSenderId: "311601771834", appId: "1:311601771834:web:e3c60ad9b0a5306bda4c03" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const q = query(collection(db, "readers"), orderBy("createdAt", "asc"));
    onSnapshot(q, (snapshot) => {
        const dynamicOnes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data(), isDynamic: true }));
        window.updateAllReaders(dynamicOnes);
    });
</script>

<script>
    const suras = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الانسان","المرسلات","النبأ","النازعات","عبس","التكوير","الإنفطار","المطففين","الإنشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
    
    const staticReaders = [
        { id: 1, name: "محمد صديق المنشاوي", img:"minshawi.jpg", base_murattal: "https://server10.mp3quran.net/minsh/", base_mojawwad: "https://server10.mp3quran.net/minsh/Almusshaf-Al-Mojawwad/", mode: "murattal" },
        { id: 2, name: "عبدالباسط عبدالصمد", img: "baset.jpg", base_murattal: "https://server7.mp3quran.net/basit/", base_mojawwad: "https://server7.mp3quran.net/basit/Almusshaf-Al-Mojawwad/", mode: "murattal" },
        { id: 3, name: "محمود خليل الحصري", img: "hosary.jpg", base_murattal: "https://server13.mp3quran.net/husr/", base_mojawwad: "https://server13.mp3quran.net/husr/Almusshaf-Al-Mojawwad/", mode: "murattal" },
        { id: 4, name: "مصطفى إسماعيل", img: "mostafa.jpg", base_murattal: "https://server8.mp3quran.net/mustafa/", base_mojawwad: "https://server8.mp3quran.net/mustafa/Almusshaf-Al-Mojawwad/", mode: "murattal" },
        { id: 5, name: "محمود علي البنا", img: "bna.jpg", base_murattal: "https://server8.mp3quran.net/bna/", base_mojawwad: "https://server8.mp3quran.net/bna/Almusshaf-Al-Mojawwad/", mode: "murattal" },
        { id: 6, name: "ياسر الدوسري", img: "dosri.jpg", base: "https://server11.mp3quran.net/yasser/" },
        { id: 7, name: "ماهر المعيقلي", img: "Maher_Al_Mueaqly.png", base: "https://server12.mp3quran.net/maher/Almusshaf-Al-Mojawwad/" },
        { id: 8, name: "مشاري العفاسي", img: "afasy.jpg", base: "https://server8.mp3quran.net/afs/" },
        { id: 9, name: "إسلام صبحي", img: "islam sobhi.jpg", base: "https://server14.mp3quran.net/islam/Rewayat-Hafs-A-n-Assem/" },
        { id: 10, name: "أحمد العجمي", img: "أحمد بن علي العجمي.jpg", base: "https://server10.mp3quran.net/ajm/128/" },
        { id: 11, name: "سعد الغامدي", img: "الغامدي.jpg", base: "https://server7.mp3quran.net/s_gmd/128/" },
        { id: 12, name: "سعود الشريم", img: "الشريم.jpg", base: "https://server7.mp3quran.net/shur/128/" },
        { id: 13, name: "عبدالرحمن السديس", img: "السديس.jpg", base: "https://server11.mp3quran.net/sds/" },
        { id: 14, name: "خالد الجليل", img: "الجليل.jpg", base: "https://server10.mp3quran.net/jleel/" },
        { id: 15, name: "فارس عباد", img: "فارس عباد.webp", base: "https://server8.mp3quran.net/frs_a/" },
        { id: 16, name: "إدريس أبكر", img: "idrees-abkar.jpg", base: "https://server6.mp3quran.net/abkr/" },
        { id: 17, name: "ناصر القطامي", img: "القطامي.jpg", base: "https://server6.mp3quran.net/qtm/" },
        { id: 18, name: "محمد اللحيدان", img: "اللحيدان.jpg", base: "https://server8.mp3quran.net/lhdan/" },
        { id: 19, name: "بدر التركي", img: "بدر التركي.jpg", base: "https://server10.mp3quran.net/bader/Rewayat-Hafs-A-n-Assem/" },
        { id: 20, name: "صلاح بو خاطر", img: "صلاح بو خاطر.jpg", base: "https://server8.mp3quran.net/bu_khtr/" },
        { id: 21, name: "محمد محمود الطبلاوي", img: "الطبلاوي.webp", base: "https://server12.mp3quran.net/tblawi/" },
        { id: 22, name: "هاني الرفاعي", img: "هاني الرفاعي.jpg", base: "https://server8.mp3quran.net/hani/" },
        { id: 23, name: "أبو بكر الشاطري", img: "abu-bakr-al-shatri.jpg", base: "https://server11.mp3quran.net/shatri/" },
        { id: 24, name: "علي جابر", img: "علي جابر.jpg", base: "https://server11.mp3quran.net/a_jbr/" },
        { id: 25, name: "محمد أيوب", img: "محمد ايوب.jpg", base: "https://server8.mp3quran.net/ayyub/" },
        { id: 26, name: "خليفة الطنيجي", img: "khalifa-al-tunaiji.png", base: "https://server12.mp3quran.net/tnjy/" },
        { id: 27, name: "الدوكالي العالم", img: "doukali-muhammad-al-alam2.webp", base: "https://server7.mp3quran.net/dokali/" },
        { id: 28, name: "علي الحذيفي", img: "الحذيفي.jpg", base: "https://server9.mp3quran.net/hthfi/128-hfs/" },
        { id: 29, name: "بندر بليله", img: "بندر بليله.jpg", base: "https://server6.mp3quran.net/balilah/" },
        { id: 30, name: "احمد نعينع", img: "احمد نعينع.jpg", base: "https://server11.mp3quran.net/ahmad_nu/" },
        { id: 31, name: "عبدالبديع غيلان", img: "عبدالبديع غيلان.jpg", base: "https://server16.mp3quran.net/A-Ghailan/Rewayat-Hafs-A-n-Assem/" }
    ];

    let allReaders = [...staticReaders];
    let favorites = JSON.parse(localStorage.getItem('favReaders')) || [];
    const audio = document.getElementById("mainAudio");
    const playerWrap = document.getElementById("playerWrap");

    window.updateAllReaders = (dynamicOnes) => {
        allReaders = [...staticReaders, ...dynamicOnes];
        renderReaders(document.getElementById("searchInput").value);
    };

    function renderReaders(query = "") {
        const rList = document.getElementById("rList");
        const favList = document.getElementById("favList");
        rList.innerHTML = ""; favList.innerHTML = "";
        allReaders.filter(r => r.name.includes(query)).forEach(r => {
            const isFav = favorites.includes(r.id.toString());
            const card = createCard(r, isFav);
            rList.appendChild(card);
            if(isFav && query === "") favList.appendChild(createCard(r, isFav, true));
        });
        document.getElementById('fav-section').style.display = (favorites.length > 0 && query === "") ? 'block' : 'none';
    }

    function createCard(r, isFav, isFavCopy = false) {
        const card = document.createElement("div");
        card.className = "reader-card";
        const uniqueId = isFavCopy ? `fav-${r.id}` : `all-${r.id}`;
        const hasBoth = (r.base_murattal && r.base_mojawwad);
        card.innerHTML = `
            <div class="reader-header" onclick="toggleCard('${uniqueId}')">
                <img src="${r.img}" class="reader-avatar" onerror="this.src='https://via.placeholder.com/50';">
                <div class="reader-name">${r.name}</div>
                <button class="fav-btn ${isFav ? 'is-fav' : ''}" onclick="toggleFav(event, '${r.id}')" style="background:none; border:none; color:rgba(255,255,255,0.2); font-size:20px;">♥</button>
            </div>
            ${hasBoth ? `<div class="mode-selector">
                <div class="mode-btn ${r.mode === 'murattal' ? 'active' : ''}" onclick="event.stopPropagation(); setMode('${r.id}', 'murattal', '${uniqueId}')">مرتل</div>
                <div class="mode-btn ${r.mode === 'mojawwad' ? 'active' : ''}" onclick="event.stopPropagation(); setMode('${r.id}', 'mojawwad', '${uniqueId}')">مجود</div>
            </div>` : ''}
            <div class="suras-box" id="box-${uniqueId}"></div>`;
        
        const box = card.querySelector(`#box-${uniqueId}`);
        suras.forEach((s, idx) => {
            const item = document.createElement("div");
            item.className = "sura-item"; item.textContent = s;
            item.onclick = (e) => { e.stopPropagation(); playSura(r, s, idx+1); };
            box.appendChild(item);
        });
        return card;
    }

    function playSura(r, sName, sNum) {
        let base = (r.base_murattal && r.base_mojawwad) ? (r.mode === 'mojawwad' ? r.base_mojawwad : r.base_murattal) : (r.base || r.base_murattal);
        audio.src = `${base}${sNum.toString().padStart(3,'0')}.mp3`;
        document.getElementById("m-track").textContent = sName;
        document.getElementById("e-track").textContent = sName;
        document.getElementById("m-reader").textContent = r.name;
        document.getElementById("e-reader").textContent = r.name;
        document.getElementById("m-img").src = r.img;
        document.getElementById("e-img").src = r.img;
        playerWrap.style.display = "flex";
        audio.play();
        updatePlayIcons(true);
    }

    function toggleCard(id) {
        const box = document.getElementById(`box-${id}`);
        const card = box.parentElement;
        const isOpen = card.classList.contains('open');
        document.querySelectorAll('.reader-card').forEach(c => c.classList.remove('open'));
        if(!isOpen) card.classList.add('open');
    }

    function toggleFav(e, id) {
        e.stopPropagation();
        const strId = id.toString();
        const idx = favorites.indexOf(strId);
        idx > -1 ? favorites.splice(idx, 1) : favorites.push(strId);
        localStorage.setItem('favReaders', JSON.stringify(favorites));
        renderReaders(document.getElementById("searchInput").value);
    }

    function setMode(id, mode, uniqueId) {
        const r = allReaders.find(item => item.id == id);
        if(r) r.mode = mode;
        renderReaders(document.getElementById("searchInput").value);
    }

    function togglePlay() { audio.paused ? (audio.play(), updatePlayIcons(true)) : (audio.pause(), updatePlayIcons(false)); }
    function updatePlayIcons(isPlaying) { const icon = isPlaying ? "⏸" : "▶"; document.getElementById("miniPlayBtn").textContent = icon; document.getElementById("e-playBtn").textContent = icon; }
    function closePlayer() { audio.pause(); playerWrap.style.display = "none"; }
    function expandPlayer() { playerWrap.classList.add("expanded"); }
    function minimizePlayer() { playerWrap.classList.remove("expanded"); }
    function skip(sec) { audio.currentTime += sec; }
    function handleSearch() { renderReaders(document.getElementById("searchInput").value); }

    audio.ontimeupdate = () => {
        if(!isNaN(audio.duration)) {
            document.getElementById("seekSlider").value = (audio.currentTime / audio.duration) * 100;
            document.getElementById("currentTime").textContent = formatTime(audio.currentTime);
            document.getElementById("totalTime").textContent = formatTime(audio.duration);
        }
    };
    function formatTime(s) { let m = Math.floor(s/60); s = Math.floor(s%60); return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }

    if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js'); }); }
    renderReaders();
</script>
</body>
</html>
