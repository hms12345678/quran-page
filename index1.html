<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>خالص لوجه الله | Eng. Hassan Sobeh</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.9); --accent: #facc15; --text: #f8fafc; --heart-red: #ff4757; --success: #22c55e; }
        body { margin: 0; padding: 0; font-family: "Cairo", sans-serif; background: radial-gradient(circle at top, #1e293b, #0f172a); background-attachment: fixed; color: var(--text); padding-top: 155px; padding-bottom: 120px; }
        
        #top-info-bar { position: fixed; top: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 0.95); border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; z-index: 2000; box-sizing: border-box; }
        .search-container { position: fixed; top: 65px; left: 0; width: 100%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); padding: 12px 15px; z-index: 1900; box-sizing: border-box; }
        .search-input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(250, 204, 21, 0.2); background: rgba(255,255,255,0.07); color: #fff; font-family: 'Cairo'; outline: none; box-sizing: border-box; }

        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .section-title { font-size: 14px; color: var(--accent); margin: 20px 0 10px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        
        .fav-btn { font-size: 20px; cursor: pointer; transition: 0.3s; color: rgba(255,255,255,0.2); padding: 5px; }
        .fav-btn.active { color: var(--heart-red); text-shadow: 0 0 10px rgba(255, 71, 87, 0.4); }

        .reader-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; margin-bottom: 12px; overflow: hidden; transition: 0.3s; }
        .reader-card.open { border-color: var(--accent); }
        .reader-header { display: flex; align-items: center; padding: 12px; cursor: pointer; gap: 12px; }
        .reader-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        .reader-name { font-weight: 700; flex-grow: 1; font-size: 15px; }

        .mode-selector { display: none; justify-content: center; gap: 10px; padding: 10px; background: rgba(0,0,0,0.2); }
        .open .mode-selector { display: flex; }
        .mode-btn { padding: 4px 15px; border-radius: 20px; font-size: 11px; cursor: pointer; border: 1px solid var(--accent); color: var(--accent); transition: 0.3s; }
        .mode-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        .suras-box { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .open .suras-box { max-height: 380px; overflow-y: auto; padding: 15px; }
        .sura-item { background: rgba(255,255,255,0.05); padding: 10px 4px; border-radius: 8px; font-size: 12px; text-align: center; cursor: pointer; }

        .library-fab { position: fixed; right: 20px; bottom: 140px; background: var(--accent); color: #000; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; z-index: 2500; box-shadow: 0 5px 15px rgba(0,0,0,0.4); border: none; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 4000; align-items: center; justify-content: center; }
        .modal-content { background: #1e293b; width: 90%; max-width: 420px; border-radius: 25px; border: 1px solid var(--accent); padding: 20px; max-height: 80vh; overflow-y: auto; position: relative; }
        .offline-reader-item { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 10px; display: flex; align-items: center; gap: 15px; cursor: pointer; margin-bottom: 10px; border: 1px solid transparent; transition: 0.3s; }
        .offline-reader-item:hover { border-color: var(--accent); background: rgba(255,255,255,0.1); }
        .offline-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); }

        .modern-player { position: fixed; bottom: 15px; left: 10px; right: 10px; background: #1e293b; border-radius: 12px; z-index: 3000; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modern-player.expanded { bottom: 0; left: 0; right: 0; height: 100%; border-radius: 0; padding-top: 40px; }
        .mini-view { display: flex; align-items: center; padding: 10px; cursor: pointer; }
        .expanded .mini-view { display: none; }
        .mini-img { width: 40px; height: 40px; border-radius: 6px; margin-left: 10px; }
        .expanded-view { display: none; flex-direction: column; align-items: center; padding: 20px; text-align: center; }
        .expanded .expanded-view { display: flex; }
        .big-img { width: 220px; height: 220px; border-radius: 20px; border: 2px solid var(--accent); margin-bottom: 20px; }
        .player-dl-btn { background: none; border: none; color: var(--accent); font-size: 24px; cursor: pointer; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .player-dl-btn.downloaded { color: var(--success); cursor: default; }
        .play-pause-btn { width: 60px; height: 60px; background: var(--accent); color: black; border-radius: 50%; font-size: 24px; border: none; }
        .eng-footer { margin-top: auto; padding-bottom: 20px; font-weight: bold; color: var(--accent); font-size: 11px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="top-info-bar">
    <div class="prayer-next-info">
        <span style="font-size:11px; opacity:0.8">باقي على <span id="p-name">--</span></span>
        <span id="p-countdown" style="font-size:18px; font-weight:700; color:var(--accent); display:block; font-family:monospace;">00:00:00</span>
    </div>
    <div style="text-align: left; font-size: 11px;">
        <div id="h-date" style="color: var(--accent); font-weight: bold;"></div>
        <div id="m-date"></div>
    </div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن قارئ..." oninput="handleSearch()">
</div>

<div class="container">
    <div id="fav-section" style="display: none;">
        <div class="section-title">⭐ المفضلون</div>
        <div id="favList"></div>
    </div>
    <div class="section-title">📖 كل القراء</div>
    <div id="rList"></div>
</div>

<button class="library-fab" onclick="toggleLibraryModal()">💾</button>

<div class="modal-overlay" id="libraryModal" onclick="toggleLibraryModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modal-dynamic-header" style="display:flex; align-items:center; margin-bottom:15px; gap:10px;"></div>
        <div id="offlineList"></div>
        <button onclick="toggleLibraryModal()" style="width:100%; margin-top:20px; background:rgba(255,255,255,0.1); border:none; color:#fff; padding:10px; border-radius:10px; font-family:'Cairo';">إغلاق</button>
    </div>
</div>

<div class="modern-player" id="playerWrap">
    <div class="mini-view" onclick="expandPlayer()">
        <img id="m-img" src="" class="mini-img">
        <div style="flex-grow:1">
            <h4 id="m-track" style="margin:0; font-size:13px; color:var(--accent);">--</h4>
            <p id="m-reader" style="margin:0; font-size:10px; opacity:0.7">--</p>
        </div>
        <div style="display:flex; gap:15px; align-items:center; margin-right:10px;">
            <span id="miniPlayBtn" onclick="event.stopPropagation(); togglePlay();" style="font-size:20px">▶</span>
            <span onclick="event.stopPropagation(); closePlayer();" style="color:#ff4757; font-size:18px">✕</span>
        </div>
    </div>
    <div class="expanded-view">
        <button onclick="minimizePlayer()" style="background:none; border:none; color:var(--accent); font-size:24px; margin-bottom:10px;">▼</button>
        <img id="e-img" src="" class="big-img">
        <h2 id="e-track" style="color:var(--accent); margin:0;">--</h2>
        <p id="e-reader" style="opacity:0.7; margin:5px 0 20px;">--</p>
        <div style="width:100%; max-width:350px;">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
                <span id="currentTime" style="font-size:10px">00:00</span>
                <input type="range" id="seekSlider" style="flex-grow:1; accent-color:var(--accent);" value="0">
                <span id="totalTime" style="font-size:10px">00:00</span>
            </div>
            <div class="main-controls" style="display:flex; justify-content:center; align-items:center; gap:25px;">
                <button id="playerDownloadBtn" class="player-dl-btn">📥</button>
                <button style="background:none; border:none; color:white; font-size:25px" onclick="skip(-10)">⏪</button>
                <button class="play-pause-btn" id="e-playBtn" onclick="togglePlay()">▶</button>
                <button style="background:none; border:none; color:white; font-size:25px" onclick="skip(10)">⏩</button>
                <button id="loopBtn" onclick="toggleLoop()" style="background:none; border:none; color:white; font-size:20px; opacity:0.5;">🔁</button>
            </div>
        </div>
        <div class="eng-footer">Eng / Hassan Sobeh</div>
    </div>
    <audio id="mainAudio"></audio>
</div>

<script>
    const dbName = "QuranOfflineDB";
    let favorites = JSON.parse(localStorage.getItem('favReaders')) || [];
    let currentMode = "murattal";

    const initDB = () => new Promise(res => {
        const req = indexedDB.open(dbName, 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("surahs", { keyPath: "id" });
        req.onsuccess = e => res(e.target.result);
    });

    const allReaders = [
        { id: 1, name: "محمد صديق المنشاوي", img:"minshawi.jpg", base_murattal: "https://server10.mp3quran.net/minsh/", base_mojawwad: "https://server10.mp3quran.net/minsh/Almusshaf-Al-Mojawwad/", mode: "murattal" },
        { id: 2, name: "عبدالباسط عبدالصمد", img: "baset.jpg", base_murattal: "https://server7.mp3quran.net/basit/", base_mojawwad: "https://server7.mp3quran.net/basit/Almusshaf-Al-Mojawwad/", mode: "murattal" },
        { id: 3, name: "محمود خليل الحصري", img: "hosary.jpg", base_murattal: "https://server13.mp3quran.net/husr/", base_mojawwad: "https://server13.mp3quran.net/husr/Almusshaf-Al-Mojawwad/", mode: "murattal" },
        { id: 4, name: "مصطفى إسماعيل", img: "mostafa.jpg", base_murattal: "https://server8.mp3quran.net/mustafa/", base_mojawwad: "https://server8.mp3quran.net/mustafa/Almusshaf-Al-Mojawwad/", mode: "murattal" },
        { id: 5, name: "محمود علي البنا", img: "bana.jpg", base_murattal: "https://server8.mp3quran.net/bna/", base_mojawwad: "https://server8.mp3quran.net/bna/Almusshaf-Al-Mojawwad/", mode: "murattal" },
        { id: 21, name: "محمد محمود الطبلاوي", img: "الطبلاوي.webp", base_murattal: "https://server12.mp3quran.net/tblawi/", base_mojawwad: "https://server12.mp3quran.net/tblawi/Al-Mojawwad/", mode: "murattal" },
        { id: 6, name: "ياسر الدوسري", img: "dosri.jpg", base: "https://server11.mp3quran.net/yasser/" },
        { id: 7, name: "ماهر المعيقلي", img: "Maher_Al_Mueaqly.png", base: "https://server12.mp3quran.net/maher/Almusshaf-Al-Mojawwad/" },
        { id: 8, name: "مشاري العفاسي", img: "afasy.jpg", base: "https://server8.mp3quran.net/afs/" },
        { id: 9, name: "إسلام صبحي", img: "islam sobhi.jpg", base: "https://server14.mp3quran.net/islam/Rewayat-Hafs-A-n-Assem/" },
        { id: 10, name: "أحمد العجمي", img: "أحمد بن علي العجمي.jpg", base: "https://server10.mp3quran.net/ajm/128/" },
        { id: 11, name: "سعد الغامدي", img: "الغامدي.jpg", base: "https://server7.mp3quran.net/s_gmd/128/" },
        { id: 12, name: "سعود الشريم", img: "الشريم.jpg", base: "https://server7.mp3quran.net/shur/128/" },
        { id: 13, name: "عبدالرحمن السديس", img: "السديس.jpg", base: "https://server11.mp3quran.net/sds/" },
        { id: 14, name: "خالد الجليل", img: "الجليل.jpg", base: "https://server10.mp3quran.net/jleel/" },
        { id: 15, name: "فارس عباد", img: "فارس عباد.webp", base: "https://server8.mp3quran.net/frs_a/" },
        { id: 16, name: "إدريس أبكر", img: "idrees-abkar.jpg", base: "https://server6.mp3quran.net/abkr/" },
        { id: 17, name: "ناصر القطامي", img: "القطامي.jpg", base: "https://server6.mp3quran.net/qtm/" },
        { id: 18, name: "محمد اللحيدان", img: "اللحيدان.jpg", base: "https://server8.mp3quran.net/lhdan/" },
        { id: 19, name: "بدر التركي", img: "بدر التركي.jpg", base: "https://server10.mp3quran.net/bader/Rewayat-Hafs-A-n-Assem/" },
        { id: 20, name: "صلاح بو خاطر", img: "صلاح بو خاطر.jpg", base: "https://server8.mp3quran.net/bu_khtr/" }
    ];

    const surasArr = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الانسان","المرسلات","النبأ","النازعات","عبس","التكوير","الإنفطار","المطففين","الإنشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    function renderReaders(query = "") {
        const rList = document.getElementById("rList");
        const favList = document.getElementById("favList");
        const favSec = document.getElementById("fav-section");
        rList.innerHTML = ""; favList.innerHTML = "";

        const filtered = allReaders.filter(r => r.name.includes(query));
        const favs = filtered.filter(r => favorites.includes(r.id));
        const others = filtered.filter(r => !favorites.includes(r.id));

        if (favs.length > 0 && query === "") {
            favSec.style.display = "block";
            favs.forEach(r => favList.appendChild(createCard(r)));
        } else {
            favSec.style.display = "none";
        }
        others.forEach(r => rList.appendChild(createCard(r)));
    }

    function createCard(r) {
        const card = document.createElement("div"); card.className = "reader-card";
        const uid = `r-${r.id}`; const isFav = favorites.includes(r.id);
        const hasModes = r.base_murattal && r.base_mojawwad;
        card.innerHTML = `
            <div class="reader-header" onclick="toggleCard('${uid}')">
                <img src="${r.img}" class="reader-avatar" onerror="this.src='https://via.placeholder.com/50';">
                <div class="reader-name">${r.name}</div>
                <div class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite(event, ${r.id})">${isFav ? '❤️' : '🤍'}</div>
            </div>
            ${hasModes ? `<div class="mode-selector">
                <div class="mode-btn active" id="mur-${uid}" onclick="setMode(event, '${r.id}', 'murattal', '${uid}')">مرتل</div>
                <div class="mode-btn" id="moj-${uid}" onclick="setMode(event, '${r.id}', 'mojawwad', '${uid}')">مجود</div>
            </div>` : ''}
            <div class="suras-box" id="box-${uid}"></div>`;
        
        const box = card.querySelector(`#box-${uid}`);
        surasArr.forEach((s, i) => {
            const item = document.createElement("div"); item.className = "sura-item"; item.textContent = s;
            item.onclick = (e) => { e.stopPropagation(); checkAndPlay(r.id, s, i+1); };
            box.appendChild(item);
        });
        return card;
    }

    function setMode(e, id, mode, uid) { 
        e.stopPropagation(); 
        const r = allReaders.find(i => i.id == id); r.mode = mode; 
        document.getElementById(`mur-${uid}`).classList.toggle('active', mode==='murattal'); 
        document.getElementById(`moj-${uid}`).classList.toggle('active', mode==='mojawwad'); 
    }

    async function checkAndPlay(rId, sName, sNum) { 
        const r = allReaders.find(i => i.id == rId);
        const modeLabel = (r.base_murattal && r.base_mojawwad) ? (r.mode === 'mojawwad' ? "مجود" : "مرتل") : "مرتل";
        const uniqueId = `${r.name}-${modeLabel}-${sName}`; 
        const db = await initDB(); 
        const req = db.transaction("surahs", "readonly").objectStore("surahs").get(uniqueId); 
        req.onsuccess = () => req.result ? playOfflineSurah(uniqueId) : playOnline(rId, sName, sNum); 
    }

    function playOnline(rId, sName, sNum) { 
        const r = allReaders.find(i => i.id == rId); 
        const modeLabel = (r.base_murattal && r.base_mojawwad) ? (r.mode === 'mojawwad' ? "مجود" : "مرتل") : "مرتل";
        let base = (modeLabel === 'مجود') ? r.base_mojawwad : (r.base_murattal || r.base); 
        const url = `${base}${sNum.toString().padStart(3,'0')}.mp3`; 
        const audio = document.getElementById("mainAudio"); 
        audio.src = url; 
        updatePlayerUI(sName, `${r.name} (${modeLabel})`, r.img, true, () => downloadAndSaveSurah(rId, sName, sNum, url, modeLabel)); 
        audio.play(); updatePlayIcons(true); 
    }

    async function downloadAndSaveSurah(rId, sName, sNum, url, modeLabel) { 
        const r = allReaders.find(i => i.id == rId); 
        const uniqueId = `${r.name}-${modeLabel}-${sName}`;
        const dlBtn = document.getElementById("playerDownloadBtn");
        dlBtn.textContent = "⏳"; dlBtn.onclick = null;

        try { 
            const blob = await fetch(url).then(res => res.blob()); 
            const db = await initDB(); 
            db.transaction("surahs", "readwrite").objectStore("surahs").put({id: uniqueId, reader: r.name, mode: modeLabel, surah: sName, img: r.img, data: blob}); 
            dlBtn.textContent = "✅"; dlBtn.classList.add('downloaded');
            refreshOfflineList(); 
        } catch (e) { alert("خطأ في التحميل"); dlBtn.textContent = "📥"; dlBtn.onclick = () => downloadAndSaveSurah(rId, sName, sNum, url, modeLabel); } 
    }

    async function playOfflineSurah(id) {
        const db = await initDB();
        const req = db.transaction("surahs", "readonly").objectStore("surahs").get(id);
        req.onsuccess = () => {
            const item = req.result;
            if (item) {
                const audio = document.getElementById("mainAudio");
                if(audio.src) URL.revokeObjectURL(audio.src);
                audio.src = URL.createObjectURL(item.data);
                updatePlayerUI(item.surah, `${item.reader} (${item.mode}) [محملة 💾]`, item.img, false);
                audio.play(); updatePlayIcons(true);
            }
        };
    }

    function updatePlayerUI(track, reader, img, canDl, dlAction) {
        document.getElementById("m-track").textContent = track;
        document.getElementById("e-track").textContent = track;
        document.getElementById("m-reader").textContent = reader;
        document.getElementById("e-reader").textContent = reader;
        document.getElementById("m-img").src = img;
        document.getElementById("e-img").src = img;
        
        const dlBtn = document.getElementById("playerDownloadBtn");
        dlBtn.classList.remove('downloaded');
        if (canDl) { dlBtn.style.display = "flex"; dlBtn.textContent = "📥"; dlBtn.onclick = dlAction; } 
        else { dlBtn.style.display = "flex"; dlBtn.textContent = "✅"; dlBtn.classList.add('downloaded'); dlBtn.onclick = null; }
        
        document.getElementById("playerWrap").style.display = "flex";

        // تحديث صورة الشيخ في الاشعارات
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: track,
                artist: reader,
                album: 'خالص لوجه الله',
                artwork: [
                    { src: img, sizes: '96x96', type: 'image/png' },
                    { src: img, sizes: '192x192', type: 'image/png' },
                    { src: img, sizes: '512x512', type: 'image/png' },
                ]
            });
            navigator.mediaSession.setActionHandler('play', () => togglePlay());
            navigator.mediaSession.setActionHandler('pause', () => togglePlay());
            navigator.mediaSession.setActionHandler('seekbackward', () => skip(-10));
            navigator.mediaSession.setActionHandler('seekforward', () => skip(10));
        }
    }

    function togglePlay() { const a = document.getElementById("mainAudio"); a.paused ? a.play() : a.pause(); updatePlayIcons(!a.paused); }
    function updatePlayIcons(p) { const i = p ? "⏸" : "▶"; document.getElementById("miniPlayBtn").textContent = i; document.getElementById("e-playBtn").textContent = i; }
    function closePlayer() { document.getElementById("mainAudio").pause(); document.getElementById("playerWrap").style.display = "none"; }
    function expandPlayer() { document.getElementById("playerWrap").classList.add("expanded"); }
    function minimizePlayer() { document.getElementById("playerWrap").classList.remove("expanded"); }
    function skip(v) { document.getElementById("mainAudio").currentTime += v; }
    
    function toggleCard(id) { 
        document.querySelectorAll('.reader-card').forEach(c => {
            if(c.querySelector(`#box-${id}`)) c.classList.toggle('open');
            else c.classList.remove('open');
        });
    }

    function handleSearch() { renderReaders(document.getElementById("searchInput").value); }

    async function refreshOfflineList() {
        const db = await initDB();
        const req = db.transaction("surahs", "readonly").objectStore("surahs").getAll();
        req.onsuccess = () => {
            const list = document.getElementById('offlineList');
            const header = document.getElementById('modal-dynamic-header');
            header.innerHTML = `<h3 style="color:var(--accent); margin:0;">💾 القراء المحملون</h3>`;
            list.innerHTML = "";
            const grouped = req.result.reduce((acc, obj) => {
                if (!acc[obj.reader]) acc[obj.reader] = { img: obj.img, surahs: [] };
                acc[obj.reader].surahs.push(obj); return acc;
            }, {});
            Object.keys(grouped).forEach(name => {
                const d = grouped[name];
                const div = document.createElement("div"); div.className = "offline-reader-item";
                div.innerHTML = `<img src="${d.img}" class="offline-avatar"><div style="flex-grow:1"><div style="font-weight:700;">${name}</div><div style="font-size:11px; opacity:0.6;">${d.surahs.length} سورة</div></div><span>◀️</span>`;
                div.onclick = () => showOfflineSurahs(name, d);
                list.appendChild(div);
            });
            if(req.result.length===0) list.innerHTML = `<p style="text-align:center; opacity:0.5;">لا توجد سور محملة</p>`;
        };
    }

    function showOfflineSurahs(name, data, activeMode = null) {
        const list = document.getElementById('offlineList');
        const header = document.getElementById('modal-dynamic-header');
        const modesAvailable = [...new Set(data.surahs.map(s => s.mode))];
        if (!activeMode) activeMode = modesAvailable[0];

        header.innerHTML = `<button onclick="refreshOfflineList()" style="background:none; border:none; color:var(--accent); font-size:18px;">🔙</button><h3 style="color:var(--accent); margin:0;">${name}</h3>`;
        list.innerHTML = "";

        if (modesAvailable.length > 1 || modesAvailable.includes("مجود")) {
            const tabBox = document.createElement("div"); tabBox.style = "display:flex; justify-content:center; gap:10px; margin-bottom:15px; width:100%;";
            modesAvailable.forEach(m => {
                const b = document.createElement("div"); b.className = `mode-btn ${activeMode === m ? 'active' : ''}`;
                b.style.display = "block"; b.textContent = m; b.onclick = () => showOfflineSurahs(name, data, m);
                tabBox.appendChild(b);
            });
            list.appendChild(tabBox);
        }

        data.surahs.filter(s => s.mode === activeMode).forEach(item => {
            const div = document.createElement("div"); div.className = "sura-item";
            div.style = "text-align:right; display:flex; justify-content:center; padding:12px; margin-bottom:6px; background:rgba(255,255,255,0.05); border-radius:8px;";
            div.innerHTML = `<span>${item.surah}</span>`;
            div.onclick = () => { playOfflineSurah(item.id); toggleLibraryModal(); };
            list.appendChild(div);
        });
    }

    function toggleLibraryModal() {
        const m = document.getElementById('libraryModal');
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        if(m.style.display === 'flex') refreshOfflineList();
    }

    // مواقيت الصلاة والساعة
    let prayerTimes = null;
    async function getPrayers() { try { const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Cairo&country=Egypt&method=5'); const d = await res.json(); prayerTimes = d.data.timings; } catch(e){} }
    function updateClock() {
        const now = new Date(); 
        document.getElementById("m-date").textContent = now.toLocaleDateString('ar-EG', {day:'numeric', month:'short'});
        document.getElementById("h-date").textContent = now.toLocaleDateString('ar-SA', {calendar:'islamic', day:'numeric', month:'long'});
        if(prayerTimes) {
            const pKeys = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"]; 
            const pNames = {Fajr:"الفجر", Dhuhr:"الظهر", Asr:"العصر", Maghrib:"المغرب", Isha:"العشاء"}; 
            let next = null;
            for(let k of pKeys) {
                const [h, m] = prayerTimes[k].split(':'); const pDate = new Date(); pDate.setHours(h, m, 0);
                if(pDate > now) { next = {n:pNames[k], d:pDate}; break; }
            }
            if(!next) { const [h, m] = prayerTimes.Fajr.split(':'); const d = new Date(now.getTime()+86400000); d.setHours(h,m,0); next = {n:"الفجر", d}; }
            document.getElementById("p-name").textContent = next.n;
            const diff = next.d - now;
            const hh=Math.floor(diff/3600000), mm=Math.floor((diff%3600000)/60000), ss=Math.floor((diff%60000)/1000);
            document.getElementById("p-countdown").textContent = `${hh.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}:${ss.toString().padStart(2,'0')}`;
        }
    }

    const audioEl = document.getElementById("mainAudio");
    audioEl.ontimeupdate = () => {
        if(!isNaN(audioEl.duration)) {
            document.getElementById("seekSlider").value = (audioEl.currentTime / audioEl.duration) * 100;
            const fmt = t => { let m=Math.floor(t/60), s=Math.floor(t%60); return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; };
            document.getElementById("currentTime").textContent = fmt(audioEl.currentTime); document.getElementById("totalTime").textContent = fmt(audioEl.duration);
        }
    };
    document.getElementById("seekSlider").oninput = e => audioEl.currentTime = (e.target.value / 100) * audioEl.duration;

    function toggleFavorite(event, id) {
        event.stopPropagation();
        const index = favorites.indexOf(id);
        if (index > -1) favorites.splice(index, 1);
        else favorites.push(id);
        localStorage.setItem('favReaders', JSON.stringify(favorites));
        renderReaders(document.getElementById("searchInput").value);
    }

    window.onload = () => { renderReaders(); getPrayers(); setInterval(updateClock, 1000); };
</script>
</body>
