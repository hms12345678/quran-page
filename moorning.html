<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>أذكار الصباح - المهندس حسن</title>
<style>
  :root {
    --bg-color: #0f172a; /* أزرق غامق ملكي */
    --card-bg: #1e293b; /* لون البطاقة */
    --accent: #38bdf8; /* أزرق سماوي للتحديد */
    --gold: #facc15;  /* ذهبي للأرقام */
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0; padding: 0;
    background: var(--bg-color);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding-bottom: 50px;
  }

  h1 {
    margin: 30px 0;
    font-size: 26px;
    color: var(--accent);
    text-shadow: 0 2px 10px rgba(56, 189, 248, 0.3);
  }

  .zikr-container {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .zikr {
    background-color: var(--card-bg);
    padding: 20px;
    border-radius: 18px;
    width: 88%;
    max-width: 500px;
    font-size: 1.15rem;
    line-height: 1.8;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    cursor: pointer;
    transition: all 0.2s ease;
    border: 1px solid rgba(56, 189, 248, 0.1);
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }

  /* تأثير عند الضغط */
  .zikr:active {
    transform: scale(0.97);
    background-color: #334155;
  }

  /* عند انتهاء العد */
  .done {
    opacity: 0.4;
    transform: scale(0.95);
    background-color: #111827;
    pointer-events: none;
    border-color: transparent;
  }

  .footer-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 15px;
    border-top: 1px solid rgba(255,255,255,0.05);
    padding-top: 10px;
  }

  .count-badge {
    background: var(--accent);
    color: #0f172a;
    width: 40px;
    height: 40px;
    line-height: 40px;
    text-align: center;
    border-radius: 50%;
    font-weight: bold;
    font-size: 1.2rem;
    box-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
  }

  .required-text {
    color: var(--gold);
    font-size: 0.9rem;
  }

  .back-link {
    position: fixed;
    top: 15px;
    right: 15px;
    background: rgba(255,255,255,0.1);
    padding: 8px 15px;
    border-radius: 10px;
    color: white;
    text-decoration: none;
    font-size: 14px;
    z-index: 100;
    backdrop-filter: blur(5px);
  }
</style>
</head>
<body>

<a href="azkar.html" class="back-link">↩ الرجوع</a>

<h1>أذكار الصباح</h1>

<div class="zikr-container" id="mainContainer"></div>

<script>
const data = [
    { t: "أَعُوذُ بِاللهِ مِنْ الشَّيْطَانِ الرَّجِيمِ: اللّهُ لاَ إِلَـهَ إِلاَّ هُوَ الْحَيُّ الْقَيُّومُ لاَ تَأْخُذُهُ سِنَةٌ وَلاَ نَوْمٌ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الأَرْضِ مَن ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلاَّ بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلاَ يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلاَّ بِمَا شَاء وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالأَرْضَ وَلاَ يَؤُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ.", c: 1 },
    { t: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم: قُلْ هُوَ ٱللَّهُ أَحَدٌ، ٱللَّهُ ٱلصَّمَدُ، لَمْ يَلِدْ وَلَمْ يُولَدْ، وَلَمْ يَكُن لَّهُۥ كُفُوًا أَحَدٌۢ.", c: 3 },
    { t: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم: قُلْ أَعُوذُ بِرَبِّ ٱلْفَلَقِ، مِن شَرِّ مَا خَلَقَ، وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ، وَمِن شَرِّ ٱلنَّفَّٰثَٰتِ فِى ٱلْعُقَدِ، وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ.", c: 3 },
    { t: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم: قُلْ أَعُوذُ بِرَبِّ ٱلنَّاسِ، مَلِكِ ٱلنَّاسِ، إِلَٰهِ ٱلنَّاسِ، مِن شَرِّ ٱلْوَسْوَاسِ ٱلْخَنَّاسِ، ٱلَّذِى يُوَسْوِسُ فِى صُدُورِ ٱلنَّاسِ، مِنَ ٱلْجِنَّةِ وَٱلنَّاسِ.", c: 3 },
    { t: "أَصْـبَحْنا وَأَصْـبَحَ المُـلْكُ لله وَالحَمدُ لله، لا إلهَ إلاّ اللّهُ وَحدَهُ لا شَريكَ لهُ، لهُ المُـلكُ ولهُ الحَمْـد، وهُوَ على كلّ شَيءٍ قدير...", c: 1 },
    { t: "اللّهـمَّ أَنْتَ رَبِّـي لا إلهَ إلاّ أَنْتَ، خَلَقْتَنـي وَأَنا عَبْـدُك، وَأَنا عَلـى عَهْـدِكَ وَوَعْـدِكَ ما اسْتَـطَعْت...", c: 1 },
    { t: "رَضيـتُ بِاللهِ رَبَّـاً وَبِالإسْلامِ ديـناً وَبِمُحَـمَّدٍ صلى الله عليه وسلم نَبِيّـاً.", c: 3 },
    { t: "اللّهُـمَّ إِنِّـي أَصْبَـحْتُ أُشْـهِدُك، وَأُشْـهِدُ حَمَلَـةَ عَـرْشِـك، وَمَلَائِكَتَكَ، وَجَمـيعَ خَلْـقِك، أَنَّـكَ أَنْـتَ اللهُ لا إلهَ إلاّ أَنْـتَ وَحْـدَكَ لا شَريكَ لَـك...", c: 4 },
    { t: "حَسْبِـيَ اللّهُ لا إلهَ إلاّ هُوَ عَلَـيهِ تَوَكَّـلتُ وَهُوَ رَبُّ العَرْشِ العَظـيم.", c: 7 },
    { t: "بِسـمِ اللهِ الذي لا يَضُـرُّ مَعَ اسمِـهِ شَيءٌ في الأرْضِ وَلا في السّمـاءِ وَهـوَ السّمـيعُ العَلـيم.", c: 3 },
    { t: "اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ على نَبِيِّنَا مُحمَّد.", c: 10 },
    { t: "لَا إلَه إلّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءِ قَدِيرِ.", c: 100 },
    { t: "سُبْحـانَ اللهِ وَبِحَمْـدِهِ.", c: 100 },
    { t: "أسْتَغْفِرُ اللهَ وَأتُوبُ إلَيْهِ", c: 100 }
    // ملاحظة: ضفت لك الأهم، وتقدر تضيف باقي النصوص بنفس الطريقة في المصفوفة هنا
];

const container = document.getElementById('mainContainer');

data.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'zikr';
    div.innerHTML = `
        ${item.t}
        <div class="footer-info">
            <span class="required-text">التكرار المطلوب</span>
            <div class="count-badge">${item.c}</div>
        </div>
    `;
    
    div.onclick = function() {
        let badge = this.querySelector('.count-badge');
        let current = parseInt(badge.innerText);
        
        if (current > 0) {
            current--;
            badge.innerText = current;
            
            // اهتزاز بسيط للموبايل
            if (navigator.vibrate) navigator.vibrate(40);
            
            // صوت الضغطة (اختياري)
            new Audio('click.mp3').play().catch(()=>{});

            if (current === 0) {
                this.classList.add('done');
                badge.style.background = '#475569';
            }
        }
    };
    container.appendChild(div);
});
</script>

</body>
</html>
