<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>أذكار المساء كاملة</title>
<style>
  :root {
    --bg-color: #0f172a;
    --card-bg: #1e293b;
    --accent: #38bdf8;
    --gold: #facc15;
  }

  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    margin: 0; padding: 0;
    background: var(--bg-color);
    color: white;
    display: flex; flex-direction: column;
    align-items: center; min-height: 100vh;
    padding-bottom: 40px;
  }

  h1 {
    margin: 25px 0; font-size: 24px;
    color: var(--accent);
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }

  .zikr-container { width: 100%; display: flex; flex-direction: column; align-items: center; }

  .zikr {
    background-color: var(--card-bg);
    padding: 20px; margin: 10px;
    border-radius: 18px; width: 88%;
    max-width: 500px; font-size: 1.1rem;
    line-height: 1.8; box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    cursor: pointer; transition: all 0.3s ease;
    border: 1px solid rgba(56, 189, 248, 0.1);
    -webkit-tap-highlight-color: transparent;
  }

  .zikr:active { transform: scale(0.98); background-color: #334155; }

  .done { opacity: 0.3; transform: scale(0.95); pointer-events: none; }

  .footer-row {
    display: flex; justify-content: space-between;
    align-items: center; margin-top: 15px;
    border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px;
  }

  .count {
    background: var(--accent); color: #0f172a;
    width: 35px; height: 35px; line-height: 35px;
    text-align: center; border-radius: 50%;
    font-weight: bold; box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
  }

  .count-label { color: var(--gold); font-size: 0.9rem; }

  .back-btn {
    position: fixed; top: 15px; right: 15px;
    background: rgba(255,255,255,0.1); color: white;
    padding: 8px 15px; border-radius: 10px;
    text-decoration: none; font-size: 14px; z-index: 100;
    backdrop-filter: blur(5px);
  }
</style>
</head>
<body>

<a href="azkar.html" class="back-btn">رجوع ↩</a>
<h1>أذكار المساء</h1>

<div class="zikr-container" id="zikrList"></div>

<script>
// مصفوفة الأذكار كاملة بالعدد المطلوب لكل ذكر
const azkarData = [
  { text: "أَعُوذُ بِاللهِ مِنْ الشَّيْطَانِ الرَّجِيمِ: اللّهُ لاَ إِلَـهَ إِلاَّ هُوَ الْحَيُّ الْقَيُّومُ... [آية الكرسى]", count: 1 },
  { text: "أَعُوذُ بِاللهِ مِنْ الشَّيْطَانِ الرَّجِيمِ: آمَنَ الرَّسُولُ بِمَا أُنْزِلَ إِلَيْهِ مِنْ رَبِّهِ... [خواتيم البقرة]", count: 1 },
  { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم: قُلْ هُوَ ٱللَّهُ أَحَدٌ...", count: 3 },
  { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم: قُلْ أَعُوذُ بِرَبِّ ٱلْفَلَقِ...", count: 3 },
  { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم: قُلْ أَعُوذُ بِرَبِّ ٱلنَّاسِ...", count: 3 },
  { text: "أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لاَ إِلَهَ إِلاَّ اللهُ وَحْدَهُ لاَ شَرِيكَ لَهُ...", count: 1 },
  { text: "اللَّهُمَّ أَنْتَ رَبِّي لاَ إِلَهَ إِلاَّ أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ...", count: 1 },
  { text: "رَضِيتُ بِاللَّهِ رَبَّاً، وَبِالْإِسْلَامِ دِيناً، وَبِمُحَمَّدٍ ﷺ نَبِيّاً.", count: 3 },
  { text: "اللَّهُمَّ إِنِّي أَمْسَيْتُ أُشْهِدُكَ، وَأُشْهِدُ حَمَلَةَ عَرْشِكَ... أَنَّكَ أَنْتَ اللَّهُ لاَ إِلَهَ إِلاَّ أَنْتَ...", count: 4 },
  { text: "اللَّهُمَّ مَا أَمْسَى بِي مِنْ نِعْمَةٍ أَوْ بِأَحَدٍ مِنْ خَلْقِكَ فَمِنْكَ وَحْدَهُ لاَ شَرِيكَ لَهُ...", count: 1 },
  { text: "حَسْبِيَ اللَّهُ لاَ إِلَهَ إِلاَّ هُوَ عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ.", count: 7 },
  { text: "بِسْمِ اللَّهِ الَّذِي لاَ يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلاَ فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ.", count: 3 },
  { text: "اللَّهُمَّ بِكَ أَمْسَيْنَا، وَبِكَ أَصْبَحْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ وَإِلَيْكَ الْمَصِيرُ.", count: 1 },
  { text: "أَمْسَيْنَا عَلَى فِطْرَةِ الْإِسْلَامِ وَعَلَى كَلِمَةِ الْإِخْلَاصِ وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ ﷺ...", count: 1 },
  { text: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ: عَدَدَ خَلْقِهِ، وَرِضَا نَفْسِهِ، وَزِنَةَ عَرْشِهِ، وَمِدَادَ كَلِمَاتِهِ.", count: 3 },
  { text: "اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لاَ إِلَهَ إِلاَّ أَنْتَ.", count: 3 },
  { text: "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْكُفْرِ، وَالْفَقْرِ، وَأَعُوذُ بِكَ مِنْ عَذَابِ الْقَبْرِ، لاَ إِلَهَ إِلاَّ أَنْتَ.", count: 3 },
  { text: "اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي الدُّنْيَا وَالْآخِرَةِ...", count: 1 },
  { text: "يَا حَيُّ يَا قَيُّومُ بِرَحْمَتِكَ أَسْتَغِيثُ أَصْلِحْ لِي شَأْنِي كُلَّهُ وَلاَ تَكِلْنِي إِلَى نَفْسِي طَرْفَةَ عَيْنٍ.", count: 3 },
  { text: "أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ رَبِّ الْعَالَمِينَ، اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ هَذِهِ اللَّيْلَةِ...", count: 1 },
  { text: "اللَّهُمَّ عَالِمَ الغَيْبِ وَالشَّهَادَةِ فَاطِرَ السَّمَاوَاتِ وَالْأَرْضِ... أَعُوذُ بِكَ مِنْ شَرِّ نَفْسِي...", count: 1 },
  { text: "أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ.", count: 3 },
  { text: "اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى نَبِيِّنَا مُحَمَّدٍ.", count: 10 },
  { text: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ.", count: 100 },
  { text: "لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ.", count: 100 }
];

const container = document.getElementById('zikrList');

azkarData.forEach((item) => {
    const div = document.createElement('div');
    div.className = 'zikr';
    div.innerHTML = `
      ${item.text}
      <div class="footer-row">
        <span class="count-label">التكرار المطلوب</span>
        <div class="count">${item.count}</div>
      </div>
    `;

    div.onclick = function() {
        const badge = this.querySelector('.count');
        let current = parseInt(badge.innerText);
        
        if (current > 0) {
            current--;
            badge.innerText = current;
            
            // اهتزاز الموبايل
            if (navigator.vibrate) navigator.vibrate(40);
            
            // تشغيل الصوت
            new Audio('click.mp3').play().catch(()=>{});

            if (current === 0) {
                this.classList.add('done');
            }
        }
    };
    container.appendChild(div);
});
</script>
</body>
</html>
