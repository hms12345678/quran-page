<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الرئيسية | خالص لوجه الله</title>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1e3c72">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="prefetch" href="index1.html">
    <link rel="prefetch" href="azkar.html">
    <link rel="prefetch" href="radio.html">
    <link rel="prefetch" href="ebtehalat.html">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #0f3460 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            direction: rtl;
            overflow-x: hidden;
            position: relative;
            touch-action: manipulation;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.2) 0%, transparent 50%);
            animation: float 25s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.4);
            z-index: 3;
            position: relative;
            line-height: 1.6;
        }

        .tab {
            position: relative;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #ffffff;
            padding: 20px;
            margin: 12px 0;
            border-radius: 22px;
            text-align: center;
            width: 100%;
            max-width: 380px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 3;
            text-decoration: none;
            display: block;
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .tab-icon {
            display: block;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .tab-text {
            font-size: 1.1rem;
            font-weight: 700;
            display: block;
        }

        .tab span:last-child {
            display: block;
            font-size: 0.85rem;
            color: #ffd700;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* Safe area للـ iPhone */
        @supports(padding: max(0px)) {
            body {
                padding-bottom: max(20px, env(safe-area-inset-bottom));
                padding-top: max(20px, env(safe-area-inset-top));
            }
        }
    </style>
</head>
<body>

<div class="title">✨ تم إعداده بواسطة م/ حسن صبيح ✨</div>

<a href="index1.html" class="tab">
    <span class="tab-icon">🕋</span>
    <span class="tab-text">القرآن الكريم</span>
    <span>استمع لأجمل الأصوات</span>
</a>

<a href="azkar.html" class="tab">
    <span class="tab-icon">📿</span>
    <span class="tab-text">الأذكار</span>
    <span>حصن المسلم اليومي</span>
</a>

<a href="ebtehalat.html" class="tab">
    <span class="tab-icon">🕌</span>
    <span class="tab-text">الابتهالات والمدائح</span>
    <span>مجموعة مختارة من الأناشيد</span>
</a>

<a href="radio.html" class="tab">
    <span class="tab-icon">📻</span>
    <span class="tab-text">الإذعات المباشرة</span>
    <span>بث مباشر على مدار الساعة</span>
</a>

<script>
    // تسجيل الـ Service Worker لضمان عمل التطبيق أوفلاين
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                console.log('PWA Active ✅');
            }).catch(err => console.log('PWA Offline Error ❌', err));
        });
    }

    // إضافة تأثير اهتزاز بسيط عند الضغط (Vibration API)
    document.querySelectorAll('.tab').forEach(button => {
        button.addEventListener('click', () => {
            if (navigator.vibrate) navigator.vibrate(40);
        });
    });
</script>

</body>
</html>
