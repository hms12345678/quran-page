<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>راديو القرآن الكريم | Royal Blue Edition</title>
    <style>
        :root {
            --royal-blue: #002366; /* الأزرق الملكي */
            --deep-blue: #001a4d;
            --silver: #e0e0e0;
            --glow: #4facfe;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* يمنع الوميض عند اللمس في الهاتف */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, var(--royal-blue), var(--deep-blue));
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }

        /* حاوية الراديو - متجاوبة */
        .radio-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 35px;
            text-align: center;
            width: 90%; /* عرض مرن للهواتف */
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ffffff20, #ffffff05);
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.3);
        }

        h1 {
            font-size: 1.5rem;
            margin: 10px 0;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--glow);
            margin-bottom: 25px;
            font-weight: 300;
        }

        /* مؤشر الصوت المطور */
        .visualizer {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 6px;
            height: 40px;
            margin-bottom: 30px;
        }

        .bar {
            width: 5px;
            background: var(--glow);
            border-radius: 10px;
            height: 8px;
            transition: 0.3s ease;
        }

        .playing .bar {
            animation: bounce 1s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { height: 8px; }
            50% { height: 40px; }
        }

        /* أزرار التحكم كبيرة لتناسب اللمس */
        .play-btn {
            background: white;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .play-btn:active {
            transform: scale(0.9);
        }

        .play-btn svg {
            width: 30px;
            height: 30px;
            fill: var(--royal-blue);
        }

        /* شريط الصوت المخصص للهاتف */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
        }

        .status-text {
            font-size: 0.8rem;
            margin-top: 20px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="radio-card">
        <div class="icon-circle">📜</div>
        <h1>إِذَاعَةُ القُرْآنِ الكَرِيمِ</h1>
        <div class="subtitle">بث مباشر من القاهرة</div>

        <div class="visualizer" id="visualizer">
            <div class="bar" style="animation-delay: 0.0s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
        </div>

        <audio id="radio-player" src="https://n04.radiojar.com/8s5u5tpdtwzuv?rj-ttl=5&rj-tok=AAABnTXKIC8AfF1HaLEAfsfVLQ"></audio>

        <button class="play-btn" id="play-trigger">
            <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>

        <div class="volume-container">
            <span>🔈</span>
            <input type="range" id="volume" min="0" max="1" step="0.05" value="0.8">
            <span>🔊</span>
        </div>

        <div class="status-text">نفعنا الله وإياكم به</div>
    </div>

    <script>
        const audio = document.getElementById('radio-player');
        const btn = document.getElementById('play-trigger');
        const icon = document.getElementById('play-icon');
        const visualizer = document.getElementById('visualizer');
        const volume = document.getElementById('volume');

        let playing = false;

        // مسار أيقونة الـ Play والـ Pause
        const playPath = "M8 5v14l11-7z";
        const pausePath = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";

        btn.addEventListener('click', () => {
            if (!playing) {
                audio.play().catch(e => console.log("البث جاري التحميل..."));
                icon.querySelector('path').setAttribute('d', pausePath);
                visualizer.classList.add('playing');
            } else {
                audio.pause();
                icon.querySelector('path').setAttribute('d', playPath);
                visualizer.classList.remove('playing');
            }
            playing = !playing;
        });

        volume.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        // في حال انقطع البث بسبب ضعف الإنترنت في الهاتف
        audio.addEventListener('stalled', () => {
            audio.load();
            if(playing) audio.play();
        });
    </script>
</body>
</html>
