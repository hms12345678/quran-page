<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إذاعة القرآن الكريم | خالص لله</title>
    <style>
        :root {
            --royal-blue: #002366;
            --deep-blue: #001a4d;
            --glow: #4facfe;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, var(--royal-blue), var(--deep-blue));
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden; /* لمنع السكرول في الموبايل */
        }

        .radio-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2rem 1.5rem;
            border-radius: 40px;
            text-align: center;
            width: 85vw; /* عرض مرن حسب حجم الشاشة */
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        .selector-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.25);
            padding: 8px;
            border-radius: 20px;
        }

        .station-btn {
            padding: 12px 4px;
            border: none;
            border-radius: 12px;
            background: transparent;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .station-btn.active {
            background: var(--glow);
            color: white;
            box-shadow: 0 4px 12px rgba(79, 172, 254, 0.4);
        }

        .icon-circle {
            width: 90px; height: 90px;
            background: linear-gradient(135deg, var(--glow), var(--royal-blue));
            margin: 0 auto 1rem;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        h1 { 
            font-size: 1.2rem; 
            margin: 0.5rem 0; 
            min-height: 3.5rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            line-height: 1.3; 
        }

        p { 
            font-size: 0.9rem; 
            color: var(--glow); 
            margin-bottom: 1.5rem; 
            font-weight: 500;
        }

        .visualizer {
            display: flex; justify-content: center; align-items: flex-end;
            gap: 6px; height: 40px; margin-bottom: 2rem;
            visibility: hidden;
        }

        .playing .visualizer { visibility: visible; }
        .bar { width: 6px; background: var(--glow); border-radius: 10px; height: 10px; }
        .playing .bar { animation: bounce 1s infinite ease-in-out; }

        @keyframes bounce { 
            0%, 100% { height: 10px; } 
            50% { height: 40px; } 
        }

        .play-btn {
            background: white; border: none;
            width: 80px; height: 80px; border-radius: 50%;
            cursor: pointer; margin-bottom: 2rem;
            display: inline-flex; justify-content: center; align-items: center;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .play-btn:active { transform: scale(0.9); }
        .play-btn svg { width: 35px; fill: var(--royal-blue); }

        .volume-container {
            display: flex; align-items: center; gap: 12px;
            background: rgba(255, 255, 255, 0.05); 
            padding: 10px 15px; 
            border-radius: 20px;
        }

        input[type="range"] { 
            flex: 1; 
            accent-color: var(--glow); 
            cursor: pointer;
            height: 4px;
        }
    </style>
</head>
<body>

    <div class="radio-card" id="mainCard">
        <div class="selector-container">
            <button id="btn-egypt" class="station-btn active" onclick="switchStation('egypt')">مصر</button>
            <button id="btn-saudi" class="station-btn" onclick="switchStation('saudi')">السعودية</button>
            <button id="btn-tafseer" class="station-btn" onclick="switchStation('tafseer')">التفسير</button>
        </div>

        <div class="icon-circle" id="station-icon">🇪🇬</div>
        <h1 id="station-name">إذاعة القرآن الكريم من القاهرة</h1>
        <p id="status-text">جاهز للتشغيل</p>

        <div class="visualizer" id="visualizer">
            <div class="bar" style="animation-delay: 0s"></div>
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
        </div>

        <audio id="radio" preload="none" crossorigin="anonymous"></audio>

        <button class="play-btn" id="playBtn">
            <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>

        <div class="volume-container">
            <span style="font-size: 14px;">🔈</span>
            <input type="range" id="volRange" min="0" max="1" step="0.05" value="0.8">
            <span style="font-size: 14px;">🔊</span>
        </div>
    </div>

    <script>
        const audio = document.getElementById('radio');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const statusText = document.getElementById('status-text');
        const stationName = document.getElementById('station-name');
        const stationIcon = document.getElementById('station-icon');
        const mainCard = document.getElementById('mainCard');
        const volRange = document.getElementById('volRange');

        let isPlaying = false;
        let currentStation = 'egypt';

        const streams = {
            egypt: "https://n04.radiojar.com/8s5u5tpdtwzuv",
            saudi: "https://n09.radiojar.com/4wqre23fytzuv",
            tafseer: "https://serverkw.quran-uni.com:8202/;*.mp3"
        };

        const stationData = {
            egypt: { name: "إذاعة القرآن الكريم من القاهرة", icon: "🇪🇬" },
            saudi: { name: "إذاعة القرآن الكريم من المملكة", icon: "🇸🇦" },
            tafseer: { name: "تفسير القرآن - الشيخ الشعراوي", icon: "🎙️" }
        };

        function switchStation(station) {
            if (currentStation === station) return;
            currentStation = station;

            document.querySelectorAll('.station-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${station}`).classList.add('active');

            stationName.innerText = stationData[station].name;
            stationIcon.innerText = stationData[station].icon;

            if (isPlaying) {
                startAudio();
            }
        }

        function startAudio() {
            statusText.innerText = "جاري الاتصال...";
            audio.pause();
            audio.src = streams[currentStation] + "?ts=" + Date.now();
            audio.load();
            
            audio.play().then(() => {
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                mainCard.classList.add('playing');
                statusText.innerText = "متصل الآن";
                isPlaying = true;
            }).catch(err => {
                statusText.innerText = "فشل! اضغط مرة أخرى";
                isPlaying = false;
                mainCard.classList.remove('playing');
            });
        }

        function stopAudio() {
            audio.pause();
            audio.src = "";
            playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            mainCard.classList.remove('playing');
            statusText.innerText = "تم إيقاف البث";
            isPlaying = false;
        }

        playBtn.addEventListener('click', () => {
            if (!isPlaying) startAudio(); else stopAudio();
        });

        volRange.addEventListener('input', (e) => audio.volume = e.target.value);
    </script>
</body>
</html>
