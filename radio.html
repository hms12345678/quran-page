<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إذاعة القرآن والسنة | مباشر</title>
    <style>
        :root {
            --royal-blue: #002366;
            --deep-blue: #001a4d;
            --glow: #4facfe;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, var(--royal-blue), var(--deep-blue));
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        .radio-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 30px 20px;
            border-radius: 40px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
        }

        .selector-container {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px;
            border-radius: 20px;
            flex-wrap: wrap; /* للسماح للأزرار بالنزول لو الشاشة صغيرة */
        }

        .station-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px 5px;
            border: none;
            border-radius: 15px;
            background: transparent;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 0.85rem;
            font-family: inherit;
        }

        .station-btn.active {
            background: var(--glow);
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        .icon-circle {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, var(--glow), var(--royal-blue));
            margin: 0 auto 15px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px;
            box-shadow: 0 0 25px rgba(79, 172, 254, 0.3);
        }

        h1 { font-size: 1.2rem; margin: 10px 0; min-height: 3rem; display: flex; align-items: center; justify-content: center; }
        p { font-size: 0.85rem; color: rgba(255, 255, 255, 0.7); margin-bottom: 20px; }

        .visualizer {
            display: flex; justify-content: center; align-items: flex-end;
            gap: 6px; height: 35px; margin-bottom: 25px;
            visibility: hidden;
        }

        .playing .visualizer { visibility: visible; }

        .bar { width: 5px; background: var(--glow); border-radius: 10px; height: 8px; }
        .playing .bar { animation: bounce 1.1s infinite ease-in-out; }

        @keyframes bounce { 0%, 100% { height: 8px; } 50% { height: 35px; } }

        .play-btn {
            background: white; border: none;
            width: 80px; height: 80px; border-radius: 50%;
            cursor: pointer; margin: 0 auto 20px;
            display: flex; justify-content: center; align-items: center;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .play-btn svg { width: 30px; fill: var(--royal-blue); }

        .volume-container {
            display: flex; align-items: center; gap: 15px;
            background: rgba(0, 0, 0, 0.2); padding: 8px 15px; border-radius: 25px;
        }

        input[type="range"] { flex: 1; accent-color: var(--glow); cursor: pointer; }
    </style>
</head>
<body>

    <div class="radio-card" id="mainCard">
        <div class="selector-container">
            <button id="btn-egypt" class="station-btn active" onclick="switchStation('egypt')">مصر 🇪🇬</button>
            <button id="btn-saudi" class="station-btn" onclick="switchStation('saudi')">السعودية 🇸🇦</button>
            <button id="btn-sunna" class="station-btn" onclick="switchStation('sunna')">السنة 🕌</button>
        </div>

        <div class="icon-circle" id="station-icon">📜</div>
        <h1 id="station-name">إذاعة القرآن الكريم من القاهرة</h1>
        <p id="status-text">بث مباشر الآن</p>

        <div class="visualizer" id="visualizer">
            <div class="bar" style="animation-delay: 0.0s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
        </div>

        <audio id="radio" preload="none"></audio>

        <button class="play-btn" id="playBtn">
            <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>

        <div class="volume-container">
            <span>🔈</span>
            <input type="range" id="volRange" min="0" max="1" step="0.1" value="0.8">
            <span>🔊</span>
        </div>
    </div>

    <script>
        const audio = document.getElementById('radio');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const statusText = document.getElementById('status-text');
        const stationName = document.getElementById('station-name');
        const stationIcon = document.getElementById('station-icon');
        const mainCard = document.getElementById('mainCard');
        const volRange = document.getElementById('volRange');

        let isPlaying = false;
        let currentStation = 'egypt';

        // الروابط المحدثة
        const streams = {
            egypt: "https://n04.radiojar.com/8s5u5tpdtwzuv",
            saudi: "https://n09.radiojar.com/4wqre23fytzuv",
            sunna: "http://andromeda.shoutca.st:8189/stream" // رابط إذاعة السنة النبوية
        };

        const stationData = {
            egypt: { name: "إذاعة القرآن الكريم من القاهرة", icon: "📜" },
            saudi: { name: "إذاعة القرآن الكريم من المملكة", icon: "🕋" },
            sunna: { name: "إذاعة السنة النبوية مباشر", icon: "🕌" }
        };

        function switchStation(station) {
            if (currentStation === station) return;
            currentStation = station;

            // تحديث تصميم الأزرار
            document.querySelectorAll('.station-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${station}`).classList.add('active');

            // تحديث المحتوى
            stationName.innerText = stationData[station].name;
            stationIcon.innerText = stationData[station].icon;

            if (isPlaying) {
                stopAudio();
                startAudio();
            }
        }

        function updateMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: stationName.innerText,
                    artist: 'بث مباشر',
                    album: 'خالص لله',
                    artwork: [{ src: './icon-512.png', sizes: '512x512', type: 'image/png' }]
                });
            }
        }

        function startAudio() {
            statusText.innerText = "جاري الاتصال بالبث...";
            audio.src = streams[currentStation] + "?t=" + Date.now();
            
            audio.play().then(() => {
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                mainCard.classList.add('playing');
                statusText.innerText = "متصل الآن - استماع ممتع";
                isPlaying = true;
                updateMediaSession();
            }).catch(err => {
                statusText.innerText = "البث غير متاح حالياً";
                console.error(err);
            });
        }

        function stopAudio() {
            audio.pause();
            audio.src = "";
            playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            mainCard.classList.remove('playing');
            statusText.innerText = "تم إيقاف البث";
            isPlaying = false;
        }

        playBtn.addEventListener('click', () => {
            if (!isPlaying) startAudio(); else stopAudio();
        });

        volRange.addEventListener('input', (e) => audio.volume = e.target.value);
    </script>
</body>
</html>
