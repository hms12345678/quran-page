<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إذاعة القرآن الكريم | مباشر الآن</title>
    <style>
        :root {
            --royal-blue: #002366;
            --deep-blue: #001a4d;
            --glow: #4facfe;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, var(--royal-blue), var(--deep-blue));
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .radio-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 50px 30px;
            border-radius: 40px;
            text-align: center;
            width: 85%;
            max-width: 360px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
        }

        .icon-circle {
            width: 90px; height: 90px;
            background: linear-gradient(135deg, var(--glow), var(--royal-blue));
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 40px;
            box-shadow: 0 0 25px rgba(79, 172, 254, 0.3);
        }

        h1 { font-size: 1.7rem; margin: 10px 0; font-weight: bold; }
        p { font-size: 0.9rem; color: rgba(255, 255, 255, 0.7); margin-bottom: 30px; }

        .visualizer {
            display: flex; justify-content: center; align-items: flex-end;
            gap: 6px; height: 45px; margin-bottom: 40px;
        }

        .bar { width: 5px; background: var(--glow); border-radius: 10px; height: 8px; transition: 0.3s; }
        .playing .bar { animation: bounce 1.1s infinite ease-in-out; }

        @keyframes bounce { 0%, 100% { height: 8px; } 50% { height: 45px; } }

        .play-btn {
            background: white; border: none;
            width: 90px; height: 90px; border-radius: 50%;
            cursor: pointer; margin: 0 auto 30px;
            display: flex; justify-content: center; align-items: center;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .play-btn:active { transform: scale(0.9); }
        .play-btn svg { width: 35px; fill: var(--royal-blue); }

        .volume-container {
            display: flex; align-items: center; gap: 15px;
            background: rgba(0, 0, 0, 0.2); padding: 10px 20px; border-radius: 25px;
        }

        input[type="range"] { flex: 1; accent-color: var(--glow); cursor: pointer; }
    </style>
</head>
<body>

    <div class="radio-card">
        <div class="icon-circle">📜</div>
        <h1>إذاعة القرآن الكريم</h1>
        <p id="status-text">بث مباشر من القاهرة</p>

        <div class="visualizer" id="visualizer">
            <div class="bar" style="animation-delay: 0.0s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
        </div>

        <audio id="radio" preload="none">
            <source src="https://n04.radiojar.com/8s5u5tpdtwzuv?rj-ttl=5&rj-tok=AAABnW4gpaUAQzGnHd89WlzWYQ" type="audio/mpeg">
        </audio>

        <button class="play-btn" id="playBtn">
            <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>

        <div class="volume-container">
            <span>🔈</span>
            <input type="range" id="volRange" min="0" max="1" step="0.1" value="0.8">
            <span>🔊</span>
        </div>
    </div>

    <script>
        const audio = document.getElementById('radio');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const visualizer = document.getElementById('visualizer');
        const volRange = document.getElementById('volRange');
        const statusText = document.getElementById('status-text');

        let isPlaying = false;

        playBtn.addEventListener('click', () => {
            if (!isPlaying) {
                // الحيلة هنا: بنعيد تعيين المصدر عشان يمسح الـ Buffer ويجيب اللحظة الحالية
                audio.load(); 
                audio.play();
                
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                visualizer.classList.add('playing');
                statusText.innerText = "متصل الآن بالبث المباشر";
            } else {
                audio.pause();
                // مسح المصدر تماماً عند الإيقاف عشان ميخزنش داتا
                audio.src = ""; 
                audio.load();
                // نرجع الرابط الأصلي تاني عشان يكون جاهز للتشغيل الجاي
                audio.src = "https://n04.radiojar.com/8s5u5tpdtwzuv?rj-ttl=5&rj-tok=AAABnW4gpaUAQzGnHd89WlzWYQ";
                
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                visualizer.classList.remove('playing');
                statusText.innerText = "تم إيقاف البث";
            }
            isPlaying = !isPlaying;
        });

        volRange.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });
    </script>
</body>
</html>
