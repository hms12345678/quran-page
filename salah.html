<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>أذكار بعد الصلاة - التصميم الملكي</title>
<style>
  :root {
    --bg-color: #0f172a;
    --card-bg: #1e293b;
    --accent: #38bdf8;
    --gold: #facc15;
  }

  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    margin: 0; padding: 0;
    background: var(--bg-color);
    color: white;
    display: flex; flex-direction: column;
    align-items: center; min-height: 100vh;
    padding-bottom: 40px;
  }

  h1 {
    margin: 25px 0; font-size: 24px;
    color: var(--accent);
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }

  .zikr-container { width: 100%; display: flex; flex-direction: column; align-items: center; }

  .zikr {
    background-color: var(--card-bg);
    padding: 20px; margin: 10px;
    border-radius: 18px; width: 88%;
    max-width: 500px; font-size: 1.1rem;
    line-height: 1.8; box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    cursor: pointer; transition: all 0.3s ease;
    border: 1px solid rgba(56, 189, 248, 0.1);
    position: relative; -webkit-tap-highlight-color: transparent;
  }

  .zikr:active { transform: scale(0.98); background-color: #334155; }
  
  .done {
    opacity: 0.3;
    transform: scale(0.95);
    background-color: #111827;
    pointer-events: none;
    filter: grayscale(1);
  }

  .footer-row {
    display: flex; justify-content: space-between;
    align-items: center; margin-top: 15px;
    border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px;
  }

  .count-badge {
    background: var(--accent); color: #0f172a;
    width: 35px; height: 35px; line-height: 35px;
    text-align: center; border-radius: 50%;
    font-weight: bold; box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
  }

  .count-label { color: var(--gold); font-size: 0.9rem; }

  .back-btn {
    position: fixed; top: 15px; right: 15px;
    background: rgba(255,255,255,0.1); color: white;
    padding: 8px 15px; border-radius: 10px;
    text-decoration: none; font-size: 14px; z-index: 100;
    backdrop-filter: blur(5px);
  }
</style>
</head>
<body>

<a href="azkar.html" class="back-btn">رجوع ↩</a>
<h1>أذكار بعد الصلاة 📿</h1>

<div class="zikr-container" id="afterSalahList"></div>

<script>
const afterSalahAzkar = [
  { text: "أَسْـتَغْفِرُ الله (3 مرات).<br>اللّهُـمَّ أَنْـتَ السَّلامُ ، وَمِـنْكَ السَّلام ، تَبارَكْتَ يا ذا الجَـلالِ وَالإِكْـرام.", count: 1 },
  { text: "لا إلهَ إلاّ اللّهُ وحدَهُ لا شريكَ لهُ، لهُ المُـلْكُ ولهُ الحَمْد، وهوَ على كلّ شَيءٍ قَدير، اللّهُـمَّ لا مانِعَ لِما أَعْطَـيْت، وَلا مُعْطِـيَ لِما مَنَـعْت، وَلا يَنْفَـعُ ذا الجَـدِّ مِنْـكَ الجَـد.", count: 1 },
  { text: "لا إلهَ إلاّ اللّه, وحدَهُ لا شريكَ لهُ، لهُ الملكُ ولهُ الحَمد، وهوَ على كلّ شيءٍ قدير، لا حَـوْلَ وَلا قـوَّةَ إِلاّ بِاللهِ، لا إلهَ إلاّ اللّـه، وَلا نَعْـبُـدُ إِلاّ إيّـاه.", count: 1 },
  { text: "سُـبْحانَ اللهِ (33).<br>الحَمْـدُ لله (33).<br>اللهُ أكْـبَر (33).", count: 1 },
  { text: "لا إلهَ إلاّ اللّهُ وَحْـدَهُ لا شريكَ لهُ، لهُ الملكُ ولهُ الحَمْد، وهُوَ على كُلّ شَيءٍ قَـدير.", count: 1 },
  { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم: { قُلْ هُوَ ٱللَّهُ أَحَدٌ }.. { قُلْ أَعُوذُ بِرَبِّ ٱلْفَلَقِ }.. { قُلْ أَعُوذُ بِرَبِّ ٱلنَّاسِ }.<br><small>(تقرأ مرة بعد كل صلاة، و3 مرات بعد الفجر والمغرب)</small>", count: 1 },
  { text: "آية الكرسى: أَعُوذُ بِاللهِ مِنْ الشَّيْطَانِ الرَّجِيمِ: اللّهُ لاَ إِلَـهَ إِلاَّ هُوَ الْحَيُّ الْقَيُّومُ...", count: 1 },
  { text: "لا إلهَ إلاّ اللّهُ وحْـدَهُ لا شريكَ لهُ، لهُ المُلكُ ولهُ الحَمْد، يُحيـي وَيُمـيتُ وهُوَ على كُلّ شيءٍ قدير.<br><small>(10 مرات بعد المغرب والفجر)</small>", count: 10 },
  { text: "اللّهُـمَّ إِنِّـي أَسْأَلُـكَ عِلْمـاً نافِعـاً وَرِزْقـاً طَيِّـباً ، وَعَمَـلاً مُتَقَـبَّلاً.<br><small>(بعد صلاة الصبح)</small>", count: 1 },
  { text: "اللَّهُمَّ أَجِرْنِي مِنْ النَّار.<br><small>(7 مرات بعد الصبح والمغرب)</small>", count: 7 },
  { text: "اللَّهُمَّ أَعِنِّي عَلَى ذِكْرِكَ وَشُكْرِكَ وَحُسْنِ عِبَادَتِكَ.", count: 1 }
];

const container = document.getElementById('afterSalahList');

afterSalahAzkar.forEach(item => {
  const card = document.createElement('div');
  card.className = 'zikr';
  card.innerHTML = `${item.text}<div class="footer-row"><span class="count-label">التكرار</span><div class="count-badge">${item.count}</div></div>`;

  card.onclick = function() {
    const badge = this.querySelector('.count-badge');
    let current = parseInt(badge.innerText);
    if (current > 0) {
      current--;
      badge.innerText = current;
      if (navigator.vibrate) navigator.vibrate(40);
      new Audio('click.mp3').play().catch(()=>{});
      if (current === 0) this.classList.add('done');
    }
  };
  container.appendChild(card);
});
</script>
</body>
</html>
